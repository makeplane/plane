name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Adding this to test setup only
      - '.github/workflows/skyramp-testbot.yml'
      # Plane API (Django)
      - 'apps/api/**'
      # Plane frontend apps
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'apps/space/**'
      - 'apps/live/**'
      # Shared packages
      - 'packages/**'
      # Build and dependency files
      - 'apps/api/requirements*.txt'
      - 'apps/api/pyproject.toml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'docker-compose.yml'
      - 'docker-compose.yaml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run testbot on (used by retrigger)'
        required: false
        type: string
      selected_tests:
        description: 'JSON array of selected tests from PR comment checkboxes'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    services:
      postgres:
        image: postgres:15.7-alpine
        env:
          POSTGRES_USER: plane
          POSTGRES_PASSWORD: plane
          POSTGRES_DB: plane
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: valkey/valkey:7.2.11-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Generate a GitHub App installation token to retrigger CI workflows on push
      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/making-authenticated-api-requests-with-a-github-app-in-a-github-actions-workflow
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # ── Plane API Setup ──────────────────────────────────────────────────────

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Plane API dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Configure Plane API environment
        run: |
          # Write to $GITHUB_ENV so all variables are exported to every subsequent step
          {
            echo "DEBUG=1"
            echo "SECRET_KEY=ci-secret-key-for-testing-only-not-for-production"
            echo "DATABASE_URL=postgresql://plane:plane@localhost:5432/plane"
            echo "REDIS_HOST=localhost"
            echo "REDIS_PORT=6379"
            echo "REDIS_URL=redis://localhost:6379/"
            echo "RABBITMQ_HOST=localhost"
            echo "RABBITMQ_PORT=5672"
            echo "RABBITMQ_USER=plane"
            echo "RABBITMQ_PASSWORD=plane"
            echo "RABBITMQ_VHOST=plane"
            echo "AWS_ACCESS_KEY_ID=access-key"
            echo "AWS_SECRET_ACCESS_KEY=secret-key"
            echo "AWS_S3_BUCKET_NAME=uploads"
            echo "AWS_S3_ENDPOINT_URL=http://localhost:9000"
            echo "USE_MINIO=0"
            echo "FILE_SIZE_LIMIT=5242880"
            echo "GUNICORN_WORKERS=2"
            echo "WEB_URL=http://localhost:8000"
            echo "CORS_ALLOWED_ORIGINS=http://localhost:3000"
            echo "ENABLE_DRF_SPECTACULAR=1"
            echo "ALLOWED_HOSTS=localhost,127.0.0.1"
          } >> "$GITHUB_ENV"

      - name: Run database migrations
        working-directory: apps/api
        run: python manage.py migrate

      - name: Bootstrap Plane instance
        working-directory: apps/api
        run: |
          python manage.py register_instance "ci-$(hostname)" || true
          python manage.py configure_instance || true
          python manage.py clear_cache || true
          python manage.py collectstatic --noinput

      - name: Start Plane API server
        working-directory: apps/api
        run: |
          nohup gunicorn -w 2 -k uvicorn.workers.UvicornWorker \
            plane.asgi:application \
            --bind 0.0.0.0:8000 \
            --access-logfile /tmp/plane-api-access.log \
            --error-logfile /tmp/plane-api-error.log &
          echo $! > /tmp/plane-api.pid

      - name: Wait for Plane API to be ready
        run: |
          echo "Waiting for Plane API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/ >/dev/null 2>&1; then
              echo "Plane API is ready after ${i} attempts."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Plane API failed to start. Logs:"
              cat /tmp/plane-api-error.log || true
              exit 1
            fi
            sleep 3
          done

      # ── Skyramp Testbot ──────────────────────────────────────────────────────

      - name: Run Skyramp Testbot
        uses: skyramp/testbot@SKYR-3625
        with:
          skyramp_mcp_version: next
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          skip_target_setup: 'true'
