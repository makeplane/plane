          push: true
          context: ./deployments/aio/community
          file: ./deployments/aio/community/Dockerfile
          tags: |
            makeplane/plane-aio-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-aio-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}
          build-args: |
            PLANE_VERSION=${{ steps.prepare_aio_assets.outputs.AIO_BUILD_VERSION }}

  deploy-plane:
    name: Deploy plane
    needs: [pre-requisites,
      branch_build_push_admin,
      branch_build_push_web,
      branch_build_push_space,
      branch_build_push_live,
      branch_build_push_monitor,
      branch_build_push_api,
      branch_build_push_proxy,
      branch_build_push_email,
      branch_build_push_silo
    ]
    if: always() && needs.pre-requisites.result == 'success' && needs.branch_build_push_admin.result == 'success' && needs.branch_build_push_web.result == 'success' && needs.branch_build_push_space.result == 'success' && needs.branch_build_push_live.result == 'success' && (needs.branch_build_push_monitor.result == 'success' || needs.branch_build_push_monitor.result == 'skipped') && needs.branch_build_push_api.result == 'success' && needs.branch_build_push_proxy.result == 'success'
    runs-on: ubuntu-22.04-4core
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Configure AWS credentials to assume the secret role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SECRET_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Retrieve deploy secrets safely
        run: |
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --secret-id ${{ secrets.AWS_SECRET_NAME || 'github-actions/github-actions-secrets' }} \
              --query SecretString \
              --output text)

            CLOUDFLARE_TOKEN=$(echo "$SECRET_JSON" | jq -r '.cloudflare_api_token')
            REDIS_URL=$(echo "$SECRET_JSON" | jq -r '.redis_url')
            RABBITMQ_URL=$(echo "$SECRET_JSON" | jq -r '.rabbitmq_url')

            # Mask sensitive values immediately after extraction
            echo "::add-mask::$REDIS_URL"
            echo "::add-mask::$CLOUDFLARE_TOKEN"
            echo "::add-mask::$RABBITMQ_URL"
            # Generate random delimiter for heredoc to prevent injection
            DELIMITER=$(openssl rand -hex 16)

            {
              echo "cloudflare_token<<${DELIMITER}"
              echo "$CLOUDFLARE_TOKEN"
              echo "${DELIMITER}"
            } >> "$GITHUB_ENV"

            {
              echo "redis_url<<${DELIMITER}"
              echo "$REDIS_URL"
              echo "${DELIMITER}"
            } >> "$GITHUB_ENV"

            {
              echo "rabbitmq_url<<${DELIMITER}"
              echo "$RABBITMQ_URL"
              echo "${DELIMITER}"
            } >> "$GITHUB_ENV"

      - name: Configure AWS credentials to assume the EKS role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_EKS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }} \
            --name ${{ secrets.EKS_CLUSTER_NAME || 'plane-eks-dev'}}

      - name: Verify access
        run: |
          kubectl get nodes

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Verify Helm
        run: |
          helm version

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge

      - name: Decide the type of helm chart to deploy
        id: decide_chart
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}" == "enterprise" ]; then
            HELM_CHART="plane-enterprise"
          else
            HELM_CHART="plane-cloud"
          fi
          echo "HELM_CHART=${HELM_CHART}" >> $GITHUB_OUTPUT
          echo "Using helm chart: ${HELM_CHART}"

      - name: Add helm chart repository
        run: |
          HELM_REPO="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.helm_repo || github.event.client_payload.slash_command.args.named.helm_repo }}"
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}" == "enterprise" ]; then
            REPO_NAME="plane-enterprise"
            DEFAULT_URL="https://helm.plane.so"
          else
            REPO_NAME="plane-cloud"
            DEFAULT_URL="https://private-helm.plane.tools"
          fi
          helm repo add "$REPO_NAME" "${HELM_REPO:-$DEFAULT_URL}"
          helm repo update
      - name: create Database
        id: create_db
        run: |
          PR_NUMBER="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"
          DEPLOY_TYPE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}"

          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            DATABASE_NAME="ee${PR_NUMBER}ent"
          else
            DATABASE_NAME="ee${PR_NUMBER}cloud"
          fi

          cat <<EOF | kubectl apply -f -
          ---
          apiVersion: db.movetokube.com/v1alpha1
          kind: Postgres
          metadata:
            name: ${DATABASE_NAME}
            namespace: postgres-operator
          spec:
            database: ${DATABASE_NAME}
            dropOnDelete: true
            schemas:
              - public
          ---
          apiVersion: db.movetokube.com/v1alpha1
          kind: PostgresUser
          metadata:
            name: ${DATABASE_NAME}-appuser
            namespace: postgres-operator
          spec:
            database: ${DATABASE_NAME}
            role: ${DATABASE_NAME}_appuser
            privileges: OWNER
            secretName: ${DATABASE_NAME}-appuser-secret
          EOF

          SECRET_NAME="${DATABASE_NAME}-appuser-secret-${DATABASE_NAME}-appuser"
          echo "Waiting for database secret ${SECRET_NAME} to be created..."
          kubectl wait --for=jsonpath='{.data.POSTGRES_URL}' \
            secret/${SECRET_NAME} \
            -n postgres-operator \
            --timeout=120s || echo "Warning: timed out waiting for secret"

          PG_URI=$(kubectl get secret "${SECRET_NAME}" -n postgres-operator -o jsonpath='{.data.POSTGRES_URL}' | base64 -d)
          echo "::add-mask::$PG_URI"
          DELIMITER=$(openssl rand -hex 16)
          {
            echo "pg_uri<<${DELIMITER}"
            echo "$PG_URI"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"

      - name: Deploy using helm with custom values
        run: |
          RELEASE_NAME="${{ needs.pre-requisites.outputs.release_version }}"
          PR_NUMBER="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"
          DEPLOY_TYPE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}"
          IMAGE_TAG="${{ needs.pre-requisites.outputs.release_version }}"

          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            CHART_REF="plane-enterprise/plane-enterprise"
          else
            CHART_REF="plane-cloud/plane-cloud"
          fi

          if [ -z "${RELEASE_NAME}" ] || [ -z "${CHART_REF}" ]; then
            echo "::error::RELEASE_NAME or CHART_REF is empty. RELEASE_NAME='${RELEASE_NAME}' CHART_REF='${CHART_REF}'"
            exit 1
          fi

          echo "Deploying release=${RELEASE_NAME} chart=${CHART_REF} namespace=${NAMESPACE}"

          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            RELEASE_NAME="${RELEASE_NAME}-ent"
            DATABASE_NAME="ee${PR_NUMBER}ent"
            PG_URI="${{ env.pg_uri }}"
            APP_HOST="feat-${PR_NUMBER}-ee.feat.plane.town"
            NAMESPACE="${RELEASE_NAME}"
            helm upgrade --install "${RELEASE_NAME}" "${CHART_REF}" \
              --namespace ${NAMESPACE} \
              --create-namespace \
              --set dockerRegistry.loginid=${{ secrets.DOCKERHUB_USERNAME }} \
              --set dockerRegistry.password=${{ secrets.DOCKERHUB_TOKEN }} \
              --set dockerRegistry.enabled=true \
              --set services.api.image=makeplane/plane-backend-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.silo.image=makeplane/plane-silo-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.web.image=makeplane/plane-web-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.space.image=makeplane/plane-space-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.live.image=makeplane/plane-live-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.monitor.image=makeplane/plane-monitor-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.admin.image=makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.proxy.image=makeplane/plane-proxy-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.email.image=makeplane/plane-email-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.postgres.local_setup=false \
              --set services.redis.local_setup=false \
              --set services.rabbitmq.local_setup=false \
              --set services.rabbitmq.external_rabbitmq_url=${{ env.rabbitmq_url }} \
              --set planeVersion=${IMAGE_TAG} \
              --set ingress.enabled=true \
              --set license.licenseDomain=${APP_HOST} \
              --set license.licenseServer=https://preview.prime.plane.town \
              --set env.web_url=https://${APP_HOST} \
              --set ssl.createIssuer=true \
              --set ssl.issuer=cloudflare \
              --set ssl.token=${{ env.cloudflare_token }} \
              --set ssl.email=engineering@plane.so \
              --set ssl.generateCerts=true \
              --set env.storageClass=gp2 \
              --set-string env.pgdb_remote_url="${PG_URI}" \
              --set-string env.remote_redis_url="${{ env.redis_url }}"
          else
            RELEASE_NAME="${RELEASE_NAME}-cloud"
            APP_HOST="feat-${PR_NUMBER}-cloud.feat.plane.town"
            NAMESPACE="${RELEASE_NAME}"
            DATABASE_NAME="ee${PR_NUMBER}cloud"
            PG_URI="${{ env.pg_uri }}"
            helm upgrade --install "${RELEASE_NAME}" "${CHART_REF}" \
              --namespace ${NAMESPACE} \
              --create-namespace \
              --set dockerhub.login_id=${{ secrets.DOCKERHUB_USERNAME }} \
              --set dockerhub.password=${{ secrets.DOCKERHUB_TOKEN }} \
              --set docker.enabled=true \
              --set ingress.app_host=${APP_HOST} \
              --set ssl.create_issuer=true \
              --set ssl.issuer=cloudflare \
              --set ssl.token=${{ env.cloudflare_token }} \
              --set ssl.email=engineering@plane.so \
              --set ssl.generate_certs=true \
              --set services.storage_class=gp2 \
              --set services.web.enabled=true \
              --set services.rabbitmq.local_setup=false \
              --set services.rabbitmq.external_rabbitmq_url=${{ env.rabbitmq_url }} \              
              --set services.web.image=makeplane/plane-web-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.space.enabled=true \
              --set services.space.image=makeplane/plane-space-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.admin.enabled=true \
              --set services.admin.image=makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.api.enabled=true \
              --set services.api.image=makeplane/plane-backend-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.proxy.enabled=true \
              --set services.proxy.image=makeplane/plane-proxy-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.live.enabled=true \
              --set services.live.image=makeplane/plane-live-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.silo.enabled=true \
              --set services.silo.image=makeplane/plane-silo-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.pi.enabled=false \
              --set services.marketplace.enabled=false \
              --set services.auth.enabled=false \
              --set services.external_api.enabled=false \
              --set services.email_service.enabled=false \
              --set services.pi_worker.enabled=false \
              --set services.pi_beat_worker.enabled=false \
              --set services.postgres.local_setup=false \
              --set services.redis.local_setup=false \
              --set services.postgres.pg_db_remote_url=${PG_URI} \
              --set services.redis.remote_redis_url=${{ env.redis_url }} \
              --set django_backend.session_cookie_domain=.plane.town \
              --set opensearch.enabled=false \
              --set planeVersion=${IMAGE_TAG}
          fi

      - name: Comment URL to access plane deployment
        uses: peter-evans/create-or-update-comment@v3
        continue-on-error: true
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          issue-number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
          body: |
            Plane deployment will be available at https://feat-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}-${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type) == 'enterprise' && 'ee' || 'cloud' }}.feat.plane.town in few minutes.
          comment-id: deploy-plane-url
