name: Deploy PR on demand

on:
    workflow_dispatch:
      inputs:
        pull_request:
          description: 'PR Number'
          required: true
        type:
          description: 'Deploy type (enterprise or cloud)'
          required: true
          default: 'cloud'
          type: choice
          options:
            - enterprise
            - cloud
        helm_repo:
          description: 'Helm repo URL (optional, uses default if empty)'
          required: false
        aio:
          description: 'Build AIO image'
          required: false
          default: false
          type: boolean
        recreate:
          description: 'Tear down existing namespace and DB before deploying (full recreate)'
          required: false
          default: false
          type: boolean
    # This workflow is only triggered by the `/deploy` command dispatch
    repository_dispatch:
      types: [deploy-command]

jobs:
  pre-requisites:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.set_env_variables.outputs.RELEASE_VERSION }}
      image_repo: ${{ steps.set_env_variables.outputs.IMAGE_REPO }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Guidelines
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          issue-number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
          body: |
            ## Deploy PR Guidelines
            Please fix merge conflicts IF ANY before using the deploy-pr command.
            If you need any new environment variables you need to release preview helm chart first.
          comment-id: deploy-pr-guidelines

      - name: Add a comment on the PR with link to workflow run
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          issue-number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
          body: |
            Deploying Your PR: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>.
            type: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}
            airgap: ${{ github.event_name == 'workflow_dispatch' && 'false' || github.event.client_payload.slash_command.args.named.airgap }}
            aio: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aio || github.event.client_payload.slash_command.args.named.aio }}
            identifier: ee-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
            helm_repo: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.helm_repo || github.event.client_payload.slash_command.args.named.helm_repo }}

      - name: Set Environment Variables
        id: set_env_variables
        run: |
            echo "RELEASE_VERSION=ee-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "BUILDX_DRIVER=docker-container" >> $GITHUB_OUTPUT
            echo "BUILDX_VERSION=latest" >> $GITHUB_OUTPUT
            echo "BUILDX_PLATFORMS=linux/amd64" >> $GITHUB_OUTPUT
            echo "BUILDX_ENDPOINT=" >> $GITHUB_OUTPUT
            if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}" == "enterprise" ]; then
              echo "IMAGE_REPO=commercial" >> $GITHUB_OUTPUT
            else
              echo "IMAGE_REPO=cloud" >> $GITHUB_OUTPUT
            fi
      - name: Print PR number
        run: |
            echo "PR number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"

  check-deployment:
    name: Check Existing Deployment
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      has_deployment: ${{ steps.check_helm.outputs.has_deployment }}
      build_admin:    ${{ steps.check_files.outputs.build_admin }}
      build_silo:     ${{ steps.check_files.outputs.build_silo }}
      build_web:      ${{ steps.check_files.outputs.build_web }}
      build_space:    ${{ steps.check_files.outputs.build_space }}
      build_live:     ${{ steps.check_files.outputs.build_live }}
      build_monitor:  ${{ steps.check_files.outputs.build_monitor }}
      build_api:      ${{ steps.check_files.outputs.build_api }}
      build_email:    ${{ steps.check_files.outputs.build_email }}
      build_proxy:    ${{ steps.check_files.outputs.build_proxy }}
    steps:
      - name: Configure AWS credentials to assume the EKS role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_EKS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }} \
            --name ${{ secrets.EKS_CLUSTER_NAME || 'plane-eks-dev' }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Check for existing helm release
        id: check_helm
        run: |
          PR_NUMBER="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"
          DEPLOY_TYPE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}"

          # When recreate=true, skip the helm check — cleanup_dp.yml handles teardown
          # via the recreate-cleanup job running in parallel.
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.recreate || github.event.client_payload.slash_command.args.named.recreate || 'false' }}" == "true" ]; then
            echo "has_deployment=false" >> "$GITHUB_OUTPUT"
            echo "Recreate flag set — all images will be rebuilt"
            exit 0
          fi

          # Only check the release matching the current deploy type.
          # This ensures a type switch (e.g. cloud → enterprise) is treated as
          # a fresh deployment so all images (including monitor) are rebuilt.
          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            RELEASE_NAME="ee-${PR_NUMBER}-ent"
          else
            RELEASE_NAME="ee-${PR_NUMBER}-cloud"
          fi

          if helm status "${RELEASE_NAME}" --namespace "${RELEASE_NAME}" &>/dev/null; then
            echo "has_deployment=true" >> "$GITHUB_OUTPUT"
            echo "Existing ${DEPLOY_TYPE} deployment found for PR ${PR_NUMBER} — selective image building enabled"
          else
            echo "has_deployment=false" >> "$GITHUB_OUTPUT"
            echo "No existing ${DEPLOY_TYPE} deployment for PR ${PR_NUMBER} — all images will be built"
          fi

      - name: Get changed files and set per-service build flags
        id: check_files
        if: steps.check_helm.outputs.has_deployment == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
          DEPLOY_TYPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}
        run: |
          rebuild_all() {
            echo "$1"
            for svc in admin silo web space live monitor api email proxy; do
              echo "build_${svc}=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          }

          # Determine the namespace for this deployment
          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            NAMESPACE="ee-${PR_NUMBER}-ent"
          else
            NAMESPACE="ee-${PR_NUMBER}-cloud"
          fi

          # Read the commit SHA that was used for the last deploy from the namespace annotation.
          # This lets us diff against everything that changed since the last build — including
          # changes merged into the base branch that aren't part of the PR itself.
          DEPLOYED_COMMIT=$(kubectl get namespace "${NAMESPACE}" \
            -o jsonpath='{.metadata.annotations.plane\.so/deployed-commit}' 2>/dev/null || echo "")

          if [ -z "${DEPLOYED_COMMIT}" ]; then
            rebuild_all "No deployed-commit annotation found on namespace ${NAMESPACE} — rebuilding all services"
          fi

          # Get the current PR merge commit SHA
          CURRENT_COMMIT=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            | jq -r '.merge_commit_sha')

          echo "Deployed commit: ${DEPLOYED_COMMIT}"
          echo "Current commit:  ${CURRENT_COMMIT}"

          if [ "${DEPLOYED_COMMIT}" == "${CURRENT_COMMIT}" ]; then
            echo "Commits are identical — no services need rebuilding"
            for svc in admin silo web space live monitor api email proxy; do
              echo "build_${svc}=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Compare the deployed commit to the current merge commit.
          # The GitHub compare API returns all files changed between the two SHAs
          # (up to 300), capturing both PR changes and any base-branch merges in between.
          COMPARE=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/compare/${DEPLOYED_COMMIT}...${CURRENT_COMMIT}" \
            || echo '{}')

          COMPARE_STATUS=$(echo "$COMPARE" | jq -r '.status // "error"')

          # If the history has diverged or the API failed, play it safe and rebuild everything.
          if [[ "$COMPARE_STATUS" == "error" || "$COMPARE_STATUS" == "diverged" || "$COMPARE_STATUS" == "behind" ]]; then
            rebuild_all "Compare status is '${COMPARE_STATUS}' — rebuilding all services to be safe"
          fi

          FILE_COUNT=$(echo "$COMPARE" | jq '.files // [] | length')
          echo "Changed files since last deploy: ${FILE_COUNT}"

          # GitHub compare API returns at most 300 files; if we hit the limit, rebuild everything.
          if [ "$FILE_COUNT" -ge 300 ]; then
            rebuild_all "Too many changed files — rebuilding all services to be safe"
          fi

          CHANGED_FILES=$(echo "$COMPARE" | jq -r '.files[]?.filename')

          # packages/** is a shared library used by all frontend services
          if echo "$CHANGED_FILES" | grep -qE '^packages/'; then
            PACKAGES_CHANGED=true
          else
            PACKAGES_CHANGED=false
          fi

          # set_flag SERVICE PATH_PATTERN AFFECTED_BY_PACKAGES
          # Sets build_SERVICE=true if the service path changed,
          # or (for frontend services) if packages/ also changed.
          set_flag() {
            local svc=$1 pattern=$2 uses_packages=${3:-false}
            if echo "$CHANGED_FILES" | grep -qE "$pattern"; then
              echo "build_${svc}=true" >> "$GITHUB_OUTPUT"
            elif [ "$uses_packages" = "true" ] && [ "$PACKAGES_CHANGED" = "true" ]; then
              echo "build_${svc}=true" >> "$GITHUB_OUTPUT"
            else
              echo "build_${svc}=false" >> "$GITHUB_OUTPUT"
            fi
          }

          set_flag admin   '^apps/admin/'   true   # frontend — uses packages/
          set_flag silo    '^apps/silo/'    false  # backend
          set_flag web     '^apps/web/'     true   # frontend — uses packages/
          set_flag space   '^apps/space/'   true   # frontend — uses packages/
          set_flag live    '^apps/live/'    true   # frontend — uses packages/
          set_flag monitor '^apps/monitor/' false  # enterprise backend
          set_flag api     '^apps/api/'     false  # backend
          set_flag email   '^apps/email/'   false  # backend
          set_flag proxy   '^apps/proxy/'   false  # nginx config

  recreate-cleanup:
    name: Recreate — tear down existing deployment
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.recreate == 'true') ||
      github.event.client_payload.slash_command.args.named.recreate == 'true'
    uses: ./.github/workflows/cleanup_dp.yml
    with:
      pr_number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
      deploy_type: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}
    secrets: inherit

  branch_build_push_admin:
    name: Build-Push Admin Docker Image
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_admin == 'true'
      )
    runs-on: ubuntu-22.04-4core
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: ./apps/admin/Dockerfile.admin
          tags: |
            makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_silo:
    name: Build-Push Silo Docker Image
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_silo == 'true'
      )
    runs-on: ubuntu-22.04-4core
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: ./apps/silo/Dockerfile.silo
          tags: |
            makeplane/plane-silo-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-silo-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_web:
    name: Build-Push Web Docker Image
    runs-on: ubuntu-22.04-4core
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_web == 'true'
      )
    permissions:
        id-token: write
        contents: read
    steps:
        - name: Checkout Code
          uses: actions/checkout@v6
          with:
            ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
        - name: Get commit short hash
          id: get_commit_short_hash
          run: |
            echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        - name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        - name: Set up QEMU
          uses: docker/setup-qemu-action@v4
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4
        - name: Build and push
          uses: docker/build-push-action@v7
          with:
            push: true
            context: .
            file: ./apps/web/Dockerfile.web
            tags: |
              makeplane/plane-web-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
              makeplane/plane-web-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_space:
    name: Build-Push Space Docker Image
    runs-on: ubuntu-22.04-4core
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_space == 'true'
      )
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: ./apps/space/Dockerfile.space
          tags: |
            makeplane/plane-space-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-space-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_live:
    name: Build-Push Live Collaboration Docker Image
    runs-on: ubuntu-22.04-4core
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_live == 'true'
      )
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          file: ./apps/live/Dockerfile.live
          tags: |
            makeplane/plane-live-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-live-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_monitor:
    name: Build-Push Monitor Docker Image
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'enterprise' ||
        github.event.client_payload.slash_command.args.named.type == 'enterprise'
      ) &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_monitor == 'true'
      )
    runs-on: ubuntu-22.04-4core
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Generate Keypair
        run: |
          echo "${{ secrets.DEFAULT_PRIME_PRIVATE_KEY }}" > private_key.pem
          openssl rsa -in private_key.pem -pubout -out public_key.pem
          cat public_key.pem

          PRIVATE_KEY=$(cat private_key.pem | base64 -w 0)
          echo "PRIVATE_KEY=${PRIVATE_KEY}" >> $GITHUB_ENV
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./apps/monitor
          file: ./apps/monitor/Dockerfile
          build-args: |
            PRIVATE_KEY=${{ env.PRIVATE_KEY }}
          tags: |
            makeplane/plane-monitor-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-monitor-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_api:
    name: Build-Push API Server Docker Image
    runs-on: ubuntu-22.04-4core
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_api == 'true'
      )
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./apps/api
          file: ./apps/api/Dockerfile.api
          tags: |
            makeplane/plane-backend-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-backend-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_email:
    name: Build-Push Email Docker Image
    runs-on: ubuntu-22.04-4core
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_email == 'true'
      )
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./apps/email
          file: ./apps/email/Dockerfile
          tags: |
            makeplane/plane-email-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-email-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}
                      
  branch_build_push_proxy:
    name: Build-Push Proxy Docker Image
    runs-on: ubuntu-22.04-4core
    needs: [pre-requisites, check-deployment]
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      (
        needs.check-deployment.outputs.has_deployment == 'false' ||
        needs.check-deployment.outputs.build_proxy == 'true'
      )
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./apps/proxy
          file: ./apps/proxy/Dockerfile.ce
          tags: |
            makeplane/plane-proxy-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-proxy-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

  branch_build_push_aio:
    name: Build-Push AIO Docker Image
    runs-on: ubuntu-22.04-4core
    needs:
      - pre-requisites
      - check-deployment
      - branch_build_push_admin
      - branch_build_push_web
      - branch_build_push_space
      - branch_build_push_live
      - branch_build_push_api
      - branch_build_push_proxy
    if: |
      always() &&
      needs.pre-requisites.result == 'success' &&
      needs.check-deployment.result == 'success' &&
      needs.branch_build_push_admin.result != 'failure' &&
      needs.branch_build_push_web.result != 'failure' &&
      needs.branch_build_push_space.result != 'failure' &&
      needs.branch_build_push_live.result != 'failure' &&
      needs.branch_build_push_api.result != 'failure' &&
      needs.branch_build_push_proxy.result != 'failure' &&
      (
        github.event_name == 'workflow_dispatch' && github.event.inputs.aio == 'true' ||
        github.event.client_payload.slash_command.args.named.aio == 'true'
      )
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Prepare AIO Assets
        id: prepare_aio_assets
        run: |
          cd deployments/aio/community

          aio_version=${{ needs.pre-requisites.outputs.release_version }}
          bash ./build.sh --release $aio_version
          echo "AIO_BUILD_VERSION=${aio_version}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./deployments/aio/community
          file: ./deployments/aio/community/Dockerfile
          tags: |
            makeplane/plane-aio-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-aio-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}
          build-args: |
            PLANE_VERSION=${{ steps.prepare_aio_assets.outputs.AIO_BUILD_VERSION }}

  deploy-plane:
    name: Deploy plane
    needs: [pre-requisites,
      check-deployment,
      recreate-cleanup,
      branch_build_push_admin,
      branch_build_push_web,
      branch_build_push_space,
      branch_build_push_live,
      branch_build_push_monitor,
      branch_build_push_api,
      branch_build_push_proxy,
      branch_build_push_email,
      branch_build_push_silo
    ]
    if: always() && needs.pre-requisites.result == 'success' && needs.check-deployment.result == 'success' && needs.recreate-cleanup.result != 'failure' && needs.branch_build_push_admin.result != 'failure' && needs.branch_build_push_web.result != 'failure' && needs.branch_build_push_space.result != 'failure' && needs.branch_build_push_live.result != 'failure' && needs.branch_build_push_monitor.result != 'failure' && needs.branch_build_push_api.result != 'failure' && needs.branch_build_push_proxy.result != 'failure' && needs.branch_build_push_email.result != 'failure' && needs.branch_build_push_silo.result != 'failure'
    runs-on: ubuntu-22.04-4core
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Configure AWS credentials to assume the secret role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_SECRET_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Retrieve deploy secrets safely
        run: |
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --secret-id ${{ secrets.AWS_SECRET_NAME || 'github-actions/github-actions-secrets' }} \
              --query SecretString \
              --output text)

            CLOUDFLARE_TOKEN=$(echo "$SECRET_JSON" | jq -r '.cloudflare_api_token')
            REDIS_URL=$(echo "$SECRET_JSON" | jq -r '.redis_url')
            RANCHER_PROJECT_ID=$(echo "$SECRET_JSON" | jq -r '.rancher_project_id')

            # Mask sensitive values immediately after extraction
            echo "::add-mask::$REDIS_URL"
            echo "::add-mask::$CLOUDFLARE_TOKEN"
            echo "::add-mask::$RANCHER_PROJECT_ID"

            # Generate random delimiter for heredoc to prevent injection
            DELIMITER=$(openssl rand -hex 16)

            {
              echo "cloudflare_token<<${DELIMITER}"
              echo "$CLOUDFLARE_TOKEN"
              echo "${DELIMITER}"
            } >> "$GITHUB_ENV"

            {
              echo "redis_url<<${DELIMITER}"
              echo "$REDIS_URL"
              echo "${DELIMITER}"
            } >> "$GITHUB_ENV"

            {
              echo "rancher_project_id<<${DELIMITER}"
              echo "$RANCHER_PROJECT_ID"
              echo "${DELIMITER}"
            } >> "$GITHUB_ENV"

      - name: Configure AWS credentials to assume the EKS role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_EKS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }} \
            --name ${{ secrets.EKS_CLUSTER_NAME || 'plane-eks-dev'}}

      - name: Verify access
        run: |
          kubectl get nodes

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Verify Helm
        run: |
          helm version

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge

      - name: Decide the type of helm chart to deploy
        id: decide_chart
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}" == "enterprise" ]; then
            HELM_CHART="plane-enterprise"
          else
            HELM_CHART="plane-cloud"
          fi
          echo "HELM_CHART=${HELM_CHART}" >> $GITHUB_OUTPUT
          echo "Using helm chart: ${HELM_CHART}"

      - name: Add helm chart repository
        run: |
          HELM_REPO="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.helm_repo || github.event.client_payload.slash_command.args.named.helm_repo }}"
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}" == "enterprise" ]; then
            REPO_NAME="plane-enterprise"
            DEFAULT_URL="https://helm.plane.so"
          else
            REPO_NAME="plane-cloud"
            DEFAULT_URL="https://private-helm.plane.tools"
          fi
          helm repo add "$REPO_NAME" "${HELM_REPO:-$DEFAULT_URL}"
          helm repo update
      - name: create Database
        id: create_db
        run: |
          PR_NUMBER="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"
          DEPLOY_TYPE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}"

          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            DATABASE_NAME="ee${PR_NUMBER}ent"
          else
            DATABASE_NAME="ee${PR_NUMBER}cloud"
          fi

          cat <<EOF | kubectl apply -f -
          ---
          apiVersion: db.movetokube.com/v1alpha1
          kind: Postgres
          metadata:
            name: ${DATABASE_NAME}
            namespace: postgres-operator
          spec:
            database: ${DATABASE_NAME}
            dropOnDelete: true
            schemas:
              - public
          ---
          apiVersion: db.movetokube.com/v1alpha1
          kind: PostgresUser
          metadata:
            name: ${DATABASE_NAME}-appuser
            namespace: postgres-operator
          spec:
            database: ${DATABASE_NAME}
            role: ${DATABASE_NAME}_appuser
            privileges: OWNER
            secretName: ${DATABASE_NAME}-appuser-secret
          EOF

          SECRET_NAME="${DATABASE_NAME}-appuser-secret-${DATABASE_NAME}-appuser"
          echo "Waiting for database secret ${SECRET_NAME} to be created..."
          kubectl wait --for=jsonpath='{.data.POSTGRES_URL}' \
            secret/${SECRET_NAME} \
            -n postgres-operator \
            --timeout=120s || echo "Warning: timed out waiting for secret"

          PG_URI=$(kubectl get secret "${SECRET_NAME}" -n postgres-operator -o jsonpath='{.data.POSTGRES_URL}' | base64 -d)
          echo "::add-mask::$PG_URI"
          DELIMITER=$(openssl rand -hex 16)
          {
            echo "pg_uri<<${DELIMITER}"
            echo "$PG_URI"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"

      - name: Deploy using helm with custom values
        run: |
          RELEASE_NAME="${{ needs.pre-requisites.outputs.release_version }}"
          PR_NUMBER="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"
          DEPLOY_TYPE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}"
          IMAGE_TAG="${{ needs.pre-requisites.outputs.release_version }}"

          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            CHART_REF="plane-enterprise/plane-enterprise"
          else
            CHART_REF="plane-cloud/plane-cloud"
          fi

          if [ -z "${RELEASE_NAME}" ] || [ -z "${CHART_REF}" ]; then
            echo "::error::RELEASE_NAME or CHART_REF is empty. RELEASE_NAME='${RELEASE_NAME}' CHART_REF='${CHART_REF}'"
            exit 1
          fi

          echo "Deploying release=${RELEASE_NAME} chart=${CHART_REF} namespace=${NAMESPACE}"

          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            RELEASE_NAME="${RELEASE_NAME}-ent"
            DATABASE_NAME="ee${PR_NUMBER}ent"
            PG_URI="${{ env.pg_uri }}"
            APP_HOST="feat-${PR_NUMBER}-ee.feat.plane.town"
            NAMESPACE="${RELEASE_NAME}"
            helm upgrade --install "${RELEASE_NAME}" "${CHART_REF}" \
              --namespace ${NAMESPACE} \
              --create-namespace \
              --set dockerRegistry.loginid=${{ secrets.DOCKERHUB_USERNAME }} \
              --set dockerRegistry.password=${{ secrets.DOCKERHUB_TOKEN }} \
              --set dockerRegistry.enabled=true \
              --set services.api.image=makeplane/plane-backend-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.silo.image=makeplane/plane-silo-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.web.image=makeplane/plane-web-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.space.image=makeplane/plane-space-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.live.image=makeplane/plane-live-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.monitor.image=makeplane/plane-monitor-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.admin.image=makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.proxy.image=makeplane/plane-proxy-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.email.image=makeplane/plane-email-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.postgres.local_setup=false \
              --set services.redis.local_setup=false \
              --set planeVersion=${IMAGE_TAG} \
              --set ingress.enabled=true \
              --set license.licenseDomain=${APP_HOST} \
              --set license.licenseServer=https://preview.prime.plane.town \
              --set env.web_url=https://${APP_HOST} \
              --set ssl.createIssuer=true \
              --set ssl.issuer=cloudflare \
              --set ssl.token=${{ env.cloudflare_token }} \
              --set ssl.email=engineering@plane.so \
              --set ssl.generateCerts=true \
              --set env.storageClass=gp2 \
              --set-string env.pgdb_remote_url="${PG_URI}" \
              --set-string env.remote_redis_url="${{ env.redis_url }}"
            kubectl annotate namespace ${NAMESPACE} field.cattle.io/projectId=${{ env.rancher_project_id }} --overwrite || true
          else
            RELEASE_NAME="${RELEASE_NAME}-cloud"
            APP_HOST="feat-${PR_NUMBER}-cloud.feat.plane.town"
            NAMESPACE="${RELEASE_NAME}"
            DATABASE_NAME="ee${PR_NUMBER}cloud"
            PG_URI="${{ env.pg_uri }}"
            helm upgrade --install "${RELEASE_NAME}" "${CHART_REF}" \
              --namespace ${NAMESPACE} \
              --create-namespace \
              --set dockerhub.login_id=${{ secrets.DOCKERHUB_USERNAME }} \
              --set dockerhub.password=${{ secrets.DOCKERHUB_TOKEN }} \
              --set docker.enabled=true \
              --set ingress.app_host=${APP_HOST} \
              --set ssl.create_issuer=true \
              --set ssl.issuer=cloudflare \
              --set ssl.token=${{ env.cloudflare_token }} \
              --set ssl.email=engineering@plane.so \
              --set ssl.generate_certs=true \
              --set services.storage_class=gp2 \
              --set services.web.enabled=true \
              --set services.web.image=makeplane/plane-web-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.space.enabled=true \
              --set services.space.image=makeplane/plane-space-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.admin.enabled=true \
              --set services.admin.image=makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.api.enabled=true \
              --set services.api.image=makeplane/plane-backend-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.proxy.enabled=true \
              --set services.proxy.image=makeplane/plane-proxy-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.live.enabled=true \
              --set services.live.image=makeplane/plane-live-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.silo.enabled=true \
              --set services.silo.image=makeplane/plane-silo-${{ needs.pre-requisites.outputs.image_repo }} \
              --set services.pi.enabled=false \
              --set services.marketplace.enabled=false \
              --set services.auth.enabled=false \
              --set services.external_api.enabled=false \
              --set services.email_service.enabled=false \
              --set services.pi_worker.enabled=false \
              --set services.pi_beat_worker.enabled=false \
              --set services.postgres.local_setup=false \
              --set services.redis.local_setup=false \
              --set services.postgres.pg_db_remote_url=${PG_URI} \
              --set services.redis.remote_redis_url=${{ env.redis_url }} \
              --set django_backend.session_cookie_domain=.plane.town \
              --set opensearch.enabled=false \
              --set planeVersion=${IMAGE_TAG}
            kubectl annotate namespace ${NAMESPACE} field.cattle.io/projectId=${{ env.rancher_project_id }} --overwrite || true
          fi

      - name: Annotate namespace with deployed commit
        run: |
          PR_NUMBER="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"
          DEPLOY_TYPE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}"
          RELEASE_NAME="${{ needs.pre-requisites.outputs.release_version }}"

          if [ "${DEPLOY_TYPE}" == "enterprise" ]; then
            NAMESPACE="${RELEASE_NAME}-ent"
          else
            NAMESPACE="${RELEASE_NAME}-cloud"
          fi

          kubectl annotate namespace "${NAMESPACE}" \
            plane.so/deployed-commit="$(git rev-parse HEAD)" \
            --overwrite

      - name: Comment URL to access plane deployment
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          issue-number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
          body: |
            Plane deployment will be available at https://feat-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}-${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type) == 'enterprise' && 'ee' || 'cloud' }}.feat.plane.town in few minutes.
          comment-id: deploy-plane-url
