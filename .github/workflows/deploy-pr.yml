name: Deploy PR on demand

on:
    workflow_dispatch:
      inputs:
        pull_request:
          description: 'PR Number'
          required: true
        type:
          description: 'Deploy type (enterprise or cloud)'
          required: true
          default: 'cloud'
          type: choice
          options:
            - enterprise
            - cloud
        helm_repo:
          description: 'Helm repo URL (optional, uses default if empty)'
          required: false
        aio:
          description: 'Build AIO image'
          required: false
          default: false
          type: boolean
    # This workflow is only triggered by the `/deploy` command dispatch
    repository_dispatch:
      types: [deploy-command]

jobs:
  pre-requisites:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.set_env_variables.outputs.RELEASE_VERSION }}
      image_repo: ${{ steps.set_env_variables.outputs.IMAGE_REPO }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Guidelines
        uses: peter-evans/create-or-update-comment@v3
        continue-on-error: true
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          issue-number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
          body: |
            ## Deploy PR Guidelines
            Please fix merge conflicts IF ANY before using the deploy-pr command.
            If you need any new environment variables you need to release preview helm chart first.
          comment-id: deploy-pr-guidelines

      - name: Add a comment on the PR with link to workflow run
        uses: peter-evans/create-or-update-comment@v3
        continue-on-error: true
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          issue-number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
          body: |
            Deploying Your PR: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>.
            type: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}
            airgap: ${{ github.event_name == 'workflow_dispatch' && 'false' || github.event.client_payload.slash_command.args.named.airgap }}
            aio: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aio || github.event.client_payload.slash_command.args.named.aio }}
            identifier: ee-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}
            helm_repo: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.helm_repo || github.event.client_payload.slash_command.args.named.helm_repo }}

      - name: Set Environment Variables
        id: set_env_variables
        run: |
            echo "RELEASE_VERSION=ee-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "BUILDX_DRIVER=docker-container" >> $GITHUB_OUTPUT
            echo "BUILDX_VERSION=latest" >> $GITHUB_OUTPUT
            echo "BUILDX_PLATFORMS=linux/amd64" >> $GITHUB_OUTPUT
            echo "BUILDX_ENDPOINT=" >> $GITHUB_OUTPUT
            if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type || github.event.client_payload.slash_command.args.named.type }}" == "enterprise" ]; then
              echo "IMAGE_REPO=commercial" >> $GITHUB_OUTPUT
            else
              echo "IMAGE_REPO=cloud" >> $GITHUB_OUTPUT
            fi
      - name: Print PR number
        run: |
            echo "PR number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}"

  branch_build_push_admin:
    name: Build-Push Admin Docker Image
    needs: [pre-requisites]
    runs-on: ubuntu-22.04-4core
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pull_request || github.event.client_payload.pull_request.number }}/merge
      - name: Get commit short hash
        id: get_commit_short_hash
        run: |
          echo "COMMIT_SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./apps/admin/Dockerfile.admin
          tags: |
            makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }}:${{ needs.pre-requisites.outputs.release_version }}
            makeplane/plane-admin-${{ needs.pre-requisites.outputs.image_repo }}:${{ steps.get_commit_short_hash.outputs.COMMIT_SHORT_HASH }}

