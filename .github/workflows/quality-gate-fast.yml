# quality-gate-fast.yml — AI Fast Track (5 Gates)
# Generated by dcl-harness. DO NOT edit manually.
# harness:actions:v1.0.0

name: Quality Gate (Fast Track)

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-1-lint:
    name: "Gate 1: Lint Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "echo "TODO: configure lint command""

  gate-2-test:
    name: "Gate 2: Unit Test (80%)"
    needs: gate-1-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "echo "TODO: configure test command""

  gate-3-security:
    name: "Gate 3: Security Scan"
    needs: gate-1-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks — secret detection
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Semgrep — code pattern analysis
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/owasp-top-ten
            p/security-audit

      # Trivy — dependency vulnerability scan
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  gate-4-ai-review:
    name: "Gate 4: AI Code Review"
    needs: [gate-2-test, gate-3-security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr-diff.txt
          echo "lines=$(wc -l < /tmp/pr-diff.txt)" >> $GITHUB_OUTPUT

      - name: AI Review (Claude)
        if: ${{ steps.diff.outputs.lines != '0' }}
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for:
            1. Security vulnerabilities
            2. Logic errors
            3. Performance issues
            4. Convention violations
            Post findings as PR comments. If no issues, approve.

  gate-5-human-review:
    name: "Gate 5: Human Review"
    needs: gate-4-ai-review
    runs-on: ubuntu-latest
    steps:
      - name: Check required approvals
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const approvals = reviews.data.filter(r => r.state === 'APPROVED').length;
            const required = parseInt('1') || 1;
            if (approvals < required) {
              core.setFailed(`Requires ${required} approval(s), got ${approvals}. Configure branch protection rules for enforcement.`);
            } else {
              core.info(`✅ ${approvals}/${required} approvals received.`);
            }
