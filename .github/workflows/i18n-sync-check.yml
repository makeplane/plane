name: i18n sync check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "preview"
      - "phoenix-releases"
      - "master"
      - "release/**"
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "ready_for_review"
    paths:
      - "packages/i18n/src/locales/**"
      - "packages/i18n/scripts/**"
      - ".github/workflows/i18n-sync-check.yml"
  push:
    branches:
      - "preview"
      - "phoenix-releases"
      - "master"
    paths:
      - "packages/i18n/src/locales/**"
      - "packages/i18n/scripts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-check:
    name: check:sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    env:
      TSX_VERSION: "4.19.2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Cache npm downloads for npx tsx
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-tsx-${{ env.TSX_VERSION }}-${{ runner.os }}

      - name: Run sync check
        run: npx --yes tsx@${{ env.TSX_VERSION }} packages/i18n/scripts/sync-check.ts --ci
