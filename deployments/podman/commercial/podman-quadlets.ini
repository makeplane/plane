# plane-db.container
[Container]
EnvironmentFile=/opt/plane/plane.env
Exec=postgres -c 'max_connections=1000'
Image=postgres:15.7-alpine
Network=systemd-plane-nw
Volume=/opt/plane/data/postgres:/var/lib/postgresql/data

[Service]
Restart=always

---

# pi-db-init.container
[Container]
EnvironmentFile=/opt/plane/plane.env
Exec=/bin/sh -c 'echo "Waiting for plane-db to be ready..."; until pg_isready -h systemd-plane-db -U ${POSTGRES_USER}; do sleep 2; done; export PGPASSWORD=${POSTGRES_PASSWORD}; psql -h systemd-plane-db -U ${POSTGRES_USER} -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '\''plane_pi'\''" | grep -q 1 || psql -h systemd-plane-db -U ${POSTGRES_USER} -d postgres -c "CREATE DATABASE plane_pi"; exit 0;'
Image=postgres:15.7-alpine
Network=systemd-plane-nw
Volume=/opt/plane/data/postgres:/var/lib/postgresql/data
DependsOn=plane-db.service

# plane-redis.container
[Container]
EnvironmentFile=/opt/plane/plane.env
Image=valkey/valkey:7.2.11-alpine
Network=systemd-plane-nw
Volume=/opt/plane/data/redis:/data

[Service]
Restart=always

---

