networks:
  plane-nw:
    driver: bridge

services:
  admin:
    image: makeplane/admin-commercial:v1.14.0
    restart: unless-stopped
    networks:
    - systemd-plane-nw
    depends_on:
    - api
    - web

  web:
    image: makeplane/web-commercial:v1.14.0
    restart: unless-stopped
    networks:
    - systemd-plane-nw
    depends_on:
    - api
    - worker

  space:
    image: makeplane/space-commercial:v1.14.0
    restart: unless-stopped
    networks:
    - systemd-plane-nw
    depends_on:
    - api
    - web

  live:
    image: makeplane/live-commercial:v1.14.0
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    depends_on:
    - api
    - web

  monitor:
    image: makeplane/monitor-commercial:v1.14.0
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    volumes:
    - /opt/plane/data/monitor:/app
    networks:
    - systemd-plane-nw

  api:
    image: makeplane/backend-commercial:v1.14.0
    command: ./bin/docker-entrypoint-api-ee.sh
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    volumes:
    - /opt/plane/logs/api:/code/plane/logs
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-redis

  worker:
    image: makeplane/backend-commercial:v1.14.0
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    volumes:
    - /opt/plane/logs/worker:/code/plane/logs
    networks:
    - systemd-plane-nw
    depends_on:
    - api
    - plane-db
    - plane-redis

  beat-worker:
    image: makeplane/backend-commercial:v1.14.0
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    networks:
    - systemd-plane-nw
    volumes:
    - /opt/plane/logs/beat_worker:/code/plane/logs
    depends_on:
    - api
    - plane-db
    - plane-redis

  migrator:
    image: makeplane/backend-commercial:v1.14.0
    command: ./bin/docker-entrypoint-migrator.sh
    restart: "no"
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so

    volumes:
    - /opt/plane/logs/migrator:/code/plane/logs
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-redis

  plane-db:
    image: postgres:15.7-alpine
    command: postgres -c 'max_connections=1000'
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    volumes:
    - /opt/plane/data/postgres:/var/lib/postgresql/data

  pi-db-init:
    image: postgres:15.7-alpine
    restart: "no"
    env_file:
    - /opt/plane/plane.env
    command: >
      /bin/sh -c '
      echo "Waiting for plane-db to be ready..."
      until pg_isready -h plane-db -U ${POSTGRES_USER}; do sleep 2; done;
      export PGPASSWORD=${POSTGRES_PASSWORD};
      createdb -h plane-db -U ${POSTGRES_USER} plane_pi --echo --if-exists=false || echo "Database plane_pi already exists or could not be created";
      exit 0;
      '
    depends_on:
    - plane-db
    networks:
    - systemd-plane-nw
    volumes:
    - /opt/plane/data/postgres:/var/lib/postgresql/data

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    volumes:
    - /opt/plane/data/redis:/data

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    volumes:
    - /opt/plane/data/rabbitmq:/var/lib/rabbitmq

  iframely:
    image: makeplane/iframely:v1.2.0
    restart: unless-stopped
    networks:
    - systemd-plane-nw

  plane-minio:
    image: minio/minio:latest
    command: server /export --console-address ":9090"
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    volumes:
    - /opt/plane/data/minio:/export

  silo:
    image: makeplane/silo-commercial:v1.14.0
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-redis
    - plane-mq

  automation-consumer:
    image: makeplane/backend-commercial:v1.14.0
    command: ./bin/docker-entrypoint-automation-consumer.sh
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-mq

  outbox-poller:
    image: makeplane/backend-commercial:v1.14.0
    command: ./bin/docker-entrypoint-outbox-poller.sh
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-mq

  pi-api:
    image: makeplane/plane-pi-commercial:v1.14.0
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-mq
    - monitor

  pi-beat:
    image: makeplane/plane-pi-commercial:v1.14.0
    command: ./bin/entrypoint-celery-beat.sh
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-mq
    - pi-api

  pi-worker:
    image: makeplane/plane-pi-commercial:v1.14.0
    command: ./bin/entrypoint-celery-worker.sh
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-mq

  pi-migrator:
    image: makeplane/plane-pi-commercial:v1.14.0
    command: ./bin/entrypoint-migrator.sh
    restart: "no"
    env_file:
    - /opt/plane/plane.env
    environment:
      DEPLOY_PLATFORM: docker_compose
      PRIME_HOST: https://prime.plane.so
    networks:
    - systemd-plane-nw
    depends_on:
    - plane-db
    - plane-mq

  # Comment this if you already have a reverse proxy running
  proxy:
    image: makeplane/proxy-commercial:v1.14.0
    restart: unless-stopped
    env_file:
    - /opt/plane/plane.env
    ports:
    - 8080:80
    - 8443:443
    volumes:
    - /opt/plane/proxy/config:/config
    - /opt/plane/proxy/data:/data
    - /opt/plane/proxy/Caddyfile:/etc/caddy/Caddyfile
    networks:
    - systemd-plane-nw
    depends_on:
    - web
    - api
    - space
    - admin
    - live
