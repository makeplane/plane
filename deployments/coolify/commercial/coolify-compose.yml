services:
  admin:
    image: artifacts.plane.so/makeplane/admin-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    deploy:
      replicas: ${ADMIN_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    depends_on:
    - api
    - web

  web:
    image: artifacts.plane.so/makeplane/web-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    deploy:
      replicas: ${WEB_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    depends_on:
    - api
    - worker

  space:
    image: artifacts.plane.so/makeplane/space-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    deploy:
      replicas: ${SPACE_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    depends_on:
    - api
    - web

  live:
    image: artifacts.plane.so/makeplane/live-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    environment:
      <<: [ *live-env, *redis-env ]
    deploy:
      replicas: ${LIVE_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    depends_on:
    - api
    - web

  monitor:
    image: artifacts.plane.so/makeplane/monitor-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    volumes:
    - "monitor_data:/app"
    environment:
      <<: [ *plane, *monitor-env ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: artifacts.plane.so/makeplane/backend-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/docker-entrypoint-api-ee.sh
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env ]
    deploy:
      replicas: ${API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    volumes:
    - api_logs:/code/plane/logs
    depends_on:
    - plane-db
    - plane-redis

  worker:
    image: artifacts.plane.so/makeplane/backend-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/docker-entrypoint-worker.sh
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env ]
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    volumes:
    - worker_logs:/code/plane/logs
    depends_on:
    - api
    - plane-db
    - plane-redis

  beat-worker:
    image: artifacts.plane.so/makeplane/backend-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/docker-entrypoint-beat.sh
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env ]
    deploy:
      replicas: ${BEAT_WORKER_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    volumes:
    - beat_worker_logs:/code/plane/logs
    depends_on:
    - api
    - plane-db
    - plane-redis

  migrator:
    image: artifacts.plane.so/makeplane/backend-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
    - migrator_logs:/code/plane/logs
    depends_on:
    - plane-db
    - plane-redis

  plane-db:
    image: postgres:15.7-alpine
    command: postgres -c 'max_connections=1000'
    environment:
      <<: [ *pg-env ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
    - pgdata:/var/lib/postgresql/data

  pi-db-init:
    image: postgres:15.7-alpine
    restart: "no"
    environment:
      <<: [*pg-env]
    command: >
      /bin/sh -c '
      echo "Waiting for plane-db to be ready...";
      until pg_isready -h plane-db -U ${POSTGRES_USER}; do sleep 2; done;
      export PGPASSWORD=${POSTGRES_PASSWORD};
      psql -h plane-db -U ${POSTGRES_USER} -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'plane_pi'" | grep -q 1 || psql -h plane-db -U ${POSTGRES_USER} -d postgres -c "CREATE DATABASE plane_pi";
      echo "Database plane_pi is ready";
      exit 0;
      '
    deploy:
      replicas: ${PI_MIGRATOR_REPLICAS:-0}
    depends_on:
      - plane-db
  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    environment:
      <<: [ *redis-env ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
    - redisdata:/data

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    environment:
      <<: [ *rabbitmq-env ]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq

  plane-minio:
    image: minio/minio:latest
    command: server /export --console-address ":9090"
    environment:
      <<: [ *docstore-env ]
      MINIO_ROOT_USER: ${SERVICE_USER_AWSACCESSKEYID}
      MINIO_ROOT_PASSWORD: ${SERVICE_PASSWORD_AWSSECRETACCESSKEY}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
    - uploads:/export
    - minio_data:/data

  iframely:
    image: artifacts.plane.so/makeplane/iframely:v1.2.0
    deploy:
      replicas: ${IFRAMELY_REPLICAS:-1}
      restart_policy:
        condition: on-failure

  silo:
    image: artifacts.plane.so/makeplane/silo-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    restart: unless-stopped
    environment:
      <<: [ *silo-env, *pg-env, *rabbitmq-env, *redis-env, *docstore-env ]
    deploy:
      replicas: ${SILO_REPLICAS:-1}
    depends_on:
    - plane-redis
    - plane-mq

  automation-consumer:
    image: artifacts.plane.so/makeplane/backend-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/docker-entrypoint-automation-consumer.sh
    environment:
      <<: [ *automation-consumer-env, *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env ]
    deploy:
      replicas: ${AUTOMATION_CONSUMER_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    depends_on:
    - plane-db
    - plane-mq

  outbox-poller:
    image: artifacts.plane.so/makeplane/backend-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/docker-entrypoint-outbox-poller.sh
    environment:
      <<: [ *outbox-poller-env, *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env ]
    deploy:
      replicas: ${OUTBOX_POLLER_REPLICAS:-1}
      restart_policy:
        condition: on-failure
    depends_on:
    - plane-db
    - plane-mq

  pi-api:
    image: artifacts.plane.so/makeplane/plane-pi-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env ]
    deploy:
      replicas: ${PI_API_REPLICAS:-0}
      restart_policy:
        condition: on-failure
    depends_on:
    - plane-db
    - plane-mq
    - monitor

  pi-beat:
    image: artifacts.plane.so/makeplane/plane-pi-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/entrypoint-celery-beat.sh
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env ]
    deploy:
      replicas: ${PI_BEAT_REPLICAS:-0}
      restart_policy:
        condition: on-failure
    depends_on:
    - plane-db
    - plane-mq
    - pi-api

  pi-worker:
    image: artifacts.plane.so/makeplane/plane-pi-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/entrypoint-celery-worker.sh
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env ]
    deploy:
      replicas: ${PI_WORKER_REPLICAS:-0}
      restart_policy:
        condition: on-failure
    depends_on:
    - plane-db
    - plane-mq

  pi-migrator:
    image: artifacts.plane.so/makeplane/plane-pi-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    command: ./bin/entrypoint-migrator.sh
    environment:
      <<: [ *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env ]
    deploy:
      replicas: ${PI_MIGRATOR_REPLICAS:-0}
      restart_policy:
        condition: on-failure
    depends_on:
    - plane-db
    - plane-mq

  # Comment this if you already have a reverse proxy running
  proxy:
    image: artifacts.plane.so/makeplane/proxy-commercial:${APP_RELEASE_VERSION:-v1.x.x}
    restart: unless-stopped
    environment:
      <<: [ *plane, *proxy-env ]
    volumes:
    - proxy_config:/config
    - proxy_data:/data
    depends_on:
    - web
    - api
    - space
    - admin
    - live
