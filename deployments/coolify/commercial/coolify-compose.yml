  CUSTOM_LLM_DESCRIPTION: ${CUSTOM_LLM_DESCRIPTION:-A self-hosted OpenAI-compatible model}
  CUSTOM_LLM_MAX_TOKENS: ${CUSTOM_LLM_MAX_TOKENS:-128000}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
  BR_AWS_ACCESS_KEY_ID: ${BR_AWS_ACCESS_KEY_ID:-}
  BR_AWS_SECRET_ACCESS_KEY: ${BR_AWS_SECRET_ACCESS_KEY:-}
