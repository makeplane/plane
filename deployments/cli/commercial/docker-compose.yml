services:
  admin:
    image: makeplane/admin-commercial:${APP_RELEASE_VERSION}
    restart: unless-stopped
    deploy:
      replicas: ${ADMIN_REPLICAS:-1}
    depends_on:
      - api
      - web

  web:
    image: makeplane/web-commercial:${APP_RELEASE_VERSION}
    restart: unless-stopped
    deploy:
      replicas: ${WEB_REPLICAS:-1}
    depends_on:
      - api
      - worker

  space:
    image: makeplane/space-commercial:${APP_RELEASE_VERSION}
    restart: unless-stopped
    deploy:
      replicas: ${SPACE_REPLICAS:-1}
    depends_on:
      - api
      - web

  live:
    image: makeplane/live-commercial:${APP_RELEASE_VERSION}
    environment:
      <<: [*live-env, *redis-env]
    restart: unless-stopped
    deploy:
      replicas: ${LIVE_REPLICAS:-1}
    depends_on:
      - api
      - web

  monitor:
    image: makeplane/monitor-commercial:${APP_RELEASE_VERSION}
    volumes:
      - ${INSTALL_DIR:-./plane}/data/monitor:/app
    environment:
      <<: [*plane, *monitor-env]
    restart: unless-stopped
    deploy:
      replicas: 1

  api:
    image: makeplane/backend-commercial:${APP_RELEASE_VERSION}
    command: ./bin/docker-entrypoint-api-ee.sh
    environment:
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env]
    restart: unless-stopped
    deploy:
      replicas: ${API_REPLICAS:-1}
    volumes:
      - ${INSTALL_DIR:-./plane}/logs/api:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis

  worker:
    image: makeplane/backend-commercial:${APP_RELEASE_VERSION}
    command: ./bin/docker-entrypoint-worker.sh
    environment:
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env]
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    volumes:
      - ${INSTALL_DIR:-./plane}/logs/worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis

  beat-worker:
    image: makeplane/backend-commercial:${APP_RELEASE_VERSION}
    command: ./bin/docker-entrypoint-beat.sh
    environment:
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env]
    restart: unless-stopped
    deploy:
      replicas: ${BEAT_WORKER_REPLICAS:-1}
    volumes:
      - ${INSTALL_DIR:-./plane}/logs/beat-worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis

  migrator:
    image: makeplane/backend-commercial:${APP_RELEASE_VERSION}
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env]
    restart: "no"
    deploy:
      replicas: 1
    volumes:
      - ${INSTALL_DIR:-./plane}/logs/migrator:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis

  plane-db:
    image: postgres:15.7-alpine
    command: postgres -c 'max_connections=1000'
    environment:
      <<: [*pg-env]
    restart: unless-stopped
    deploy:
      replicas: 1
    volumes:
      - ${INSTALL_DIR:-./plane}/data/db:/var/lib/postgresql/data

  pi-db-init:
    image: postgres:15.7-alpine
    restart: "no"
    environment:
      <<: [*pg-env]
    command: >
      /bin/sh -c '
      echo "Waiting for plane-db to be ready...";
      until pg_isready -h plane-db -U ${POSTGRES_USER}; do sleep 2; done;
      export PGPASSWORD=${POSTGRES_PASSWORD};
      psql -h plane-db -U ${POSTGRES_USER} -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'plane_pi'" | grep -q 1 || psql -h plane-db -U ${POSTGRES_USER} -d postgres -c "CREATE DATABASE plane_pi";
      echo "Database plane_pi is ready";
      exit 0;
      '
    deploy:
      replicas: ${PI_MIGRATOR_REPLICAS:-0}
    depends_on:
      - plane-db

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    environment:
      <<: [*redis-env]
    restart: unless-stopped
    deploy:
      replicas: 1
    volumes:
      - ${INSTALL_DIR:-./plane}/data/redis:/data

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    environment:
      <<: [*rabbitmq-env]
    restart: unless-stopped
    deploy:
      replicas: 1
    volumes:
      - ${INSTALL_DIR:-./plane}/data/mq:/var/lib/rabbitmq

  plane-minio:
    image: minio/minio:latest
    command: server /export --console-address ":9090"
    environment:
      <<: [*docstore-env]
    restart: unless-stopped
    deploy:
      replicas: 1
    volumes:
      - ${INSTALL_DIR:-./plane}/data/minio/uploads:/export
      - ${INSTALL_DIR:-./plane}/data/minio/data:/data

  iframely:
    image: makeplane/iframely:v1.2.0
    restart: unless-stopped
    deploy:
      replicas: ${IFRAMELY_REPLICAS:-1}

  silo:
    image: makeplane/silo-commercial:${APP_RELEASE_VERSION}
    environment:
      <<: [*silo-env, *pg-env, *rabbitmq-env, *redis-env, *docstore-env]
    restart: unless-stopped
    deploy:
      replicas: ${SILO_REPLICAS:-1}
    depends_on:
      - plane-redis
      - plane-mq

  email:
    image: makeplane/email-commercial:${APP_RELEASE_VERSION}
    volumes:
      - ${INSTALL_DIR:-./plane}/data/email/tls:/opt/email/tls
    environment:
      <<: [*email-env]
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "10025"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      replicas: ${EMAIL_REPLICAS:-0}

  automation-consumer:
    image: makeplane/backend-commercial:${APP_RELEASE_VERSION}
    command: ./bin/docker-entrypoint-automation-consumer.sh
    environment:
      <<:
        [*automation-consumer-env, *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env]
    restart: unless-stopped
    deploy:
      replicas: ${AUTOMATION_CONSUMER_REPLICAS:-1}
    depends_on:
      - plane-db
      - plane-mq

  outbox-poller:
    image: makeplane/backend-commercial:${APP_RELEASE_VERSION}
    command: ./bin/docker-entrypoint-outbox-poller.sh
    environment:
      <<: [*outbox-poller-env, *plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env]
    restart: unless-stopped
    deploy:
      replicas: ${OUTBOX_POLLER_REPLICAS:-1}
    depends_on:
      - plane-db
      - plane-mq

  pi-api:
    image: makeplane/plane-pi-commercial:${APP_RELEASE_VERSION}
    environment:
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env]
    restart: unless-stopped
    deploy:
      replicas: ${PI_API_REPLICAS:-0}
    depends_on:
      - plane-db
      - plane-mq
      - monitor

  pi-beat:
    image: makeplane/plane-pi-commercial:${APP_RELEASE_VERSION}
    command: ./bin/entrypoint-celery-beat.sh
    environment:
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env]
    restart: unless-stopped
    deploy:
      replicas: ${PI_BEAT_REPLICAS:-0}
    depends_on:
      - plane-db
      - plane-mq
      - pi-api

  pi-worker:
    image: makeplane/plane-pi-commercial:${APP_RELEASE_VERSION}
    command: ./bin/entrypoint-celery-worker.sh
    environment:  
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env]
    restart: unless-stopped
    deploy:
      replicas: ${PI_WORKER_REPLICAS:-0}
    depends_on:
      - plane-db
      - plane-mq

  pi-migrator:
    image: makeplane/plane-pi-commercial:${APP_RELEASE_VERSION}
    command: ./bin/entrypoint-migrator.sh
    environment:
      <<: [*plane, *app-env, *pg-env, *redis-env, *rabbitmq-env, *docstore-env, *opensearch-env, *pi-env]
    restart: "no"
    deploy:
      replicas: ${PI_MIGRATOR_REPLICAS:-0}
    depends_on:
      - plane-db
      - plane-mq

  # Comment this if you already have a reverse proxy running
  proxy:
    image: makeplane/proxy-commercial:${APP_RELEASE_VERSION}
    restart: unless-stopped
    environment:
      <<: [*proxy-env]
    ports:
      - target: 80
        published: ${LISTEN_HTTP_PORT:-80}
        protocol: tcp
        mode: host
      - target: 443
        published: ${LISTEN_HTTPS_PORT:-443}
        protocol: tcp
        mode: host
      - target: 10025
        published: ${LISTEN_SMTP_PORT_25:-25}
        protocol: tcp
        mode: host
      - target: 10465
        published: ${LISTEN_SMTP_PORT_465:-465}
        protocol: tcp
        mode: host
      - target: 10587
        published: ${LISTEN_SMTP_PORT_587:-587}
        protocol: tcp
        mode: host
    volumes:
      - ${INSTALL_DIR:-./plane}/caddy/config:/config
      - ${INSTALL_DIR:-./plane}/caddy/data:/data
    depends_on:
      - web
      - api
      - space
      - admin
      - live