# =============================================================================
# CI/CD Pipeline — Plane SHB
#
# Supports two environments via IS_AIRGAPPED variable:
#   IS_AIRGAPPED=false (default): gitlab.com + self-hosted runner (Docker Executor, internet)
#   IS_AIRGAPPED=true           : internal GitLab + Shell Executor (air-gapped, no internet)
#
# Stages: lint → test → build → deploy
# CI/CD targets only 3 dynamic services: web, admin, api
# (space, live, proxy deployed once manually via build-shb-images.sh + deploy-shb.sh)
# =============================================================================

stages:
  - lint
  - test
  - build
  - deploy

variables:
  PNPM_STORE_PATH: .pnpm-store
  NODE_OPTIONS: "--max-old-space-size=4096"
  # Docker image tag — short commit SHA (e.g. "a1b2c3d")
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  # Target servers (air-gapped internal)
  TEST_SERVER: "10.94.232.123"
  PROD_SERVER: "10.94.125.86"
  # Deploy directory — must match on ALL servers (test, prod, external VPS)
  PLANE_DIR: "/opt/shb-deploy/plane-app"
  # Toggle: "false" = Docker Executor + internet (gitlab.com)
  #         "true"  = Shell Executor + air-gapped (internal GitLab)
  IS_AIRGAPPED: "false"
  # Full git history required for turbo --affected to detect changed packages
  GIT_DEPTH: 0

# ─── Cache Templates ──────────────────────────────────────────────────────────

.pnpm_cache: &pnpm_cache
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

.pip_cache: &pip_cache
  key: pip-cache
  paths:
    - .pip-cache/

# ─── Base Templates ───────────────────────────────────────────────────────────

.frontend_base:
  image: node:22-alpine
  cache:
    <<: *pnpm_cache
  before_script:
    - apk add --no-cache git
    - corepack enable pnpm
    - pnpm config set store-dir $PNPM_STORE_PATH
    - pnpm install --frozen-lockfile

# =============================================================================
# STAGE 1: LINT & FORMAT
# =============================================================================

# Prettier format check — independent, no build needed
frontend:format:
  extends: .frontend_base
  stage: lint
  interruptible: true
  script:
    - pnpm turbo run check:format --affected
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Build internal packages — provides dist/ for lint + type jobs
frontend:build:
  extends: .frontend_base
  stage: lint
  interruptible: true
  script:
    - pnpm turbo run build --affected
  artifacts:
    paths:
      - .turbo/
      - packages/*/dist/
      - packages/*/build/
      - packages/*/.react-router/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ESLint — only apps/* (packages have upstream pre-existing issues)
frontend:lint:
  extends: .frontend_base
  stage: lint
  interruptible: true
  needs: [frontend:build]
  allow_failure: true
  script:
    - pnpm turbo run check:lint --filter="apps/web..." --filter="apps/admin..."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# TypeScript type check — only apps/* (packages have upstream pre-existing issues)
frontend:types:
  extends: .frontend_base
  stage: lint
  interruptible: true
  needs: [frontend:build]
  allow_failure: true
  script:
    - pnpm turbo run check:types --filter="apps/web..." --filter="apps/admin..."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Ruff Python lint — only when backend files change
backend:lint:
  stage: lint
  image: python:3.12-slim
  interruptible: true
  variables:
    PIP_CACHE_DIR: .pip-cache
  cache:
    <<: *pip_cache
  script:
    - pip install ruff
    - ruff check apps/api
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/api/**/*

# =============================================================================
# STAGE 2: TEST
# =============================================================================

# Docker Executor variant — external GitLab (IS_AIRGAPPED=false)
# Uses GitLab CI `services:` for ephemeral postgres + valkey containers
backend:test:docker:
  stage: test
  image: python:3.12-slim
  interruptible: true
  services:
    - name: postgres:15-alpine
      alias: postgres
    - name: valkey/valkey:7.2.11-alpine
      alias: redis
  variables:
    POSTGRES_DB: plane_test
    POSTGRES_USER: plane_user
    POSTGRES_PASSWORD: plane_password
    DATABASE_URL: "postgres://plane_user:plane_password@postgres:5432/plane_test"
    REDIS_URL: "redis://redis:6379/0"
    PIP_CACHE_DIR: .pip-cache
  cache:
    <<: *pip_cache
  script:
    - cd apps/api
    - pip install -r requirements/test.txt
    - python run_tests.py --unit --verbose
  rules:
    - if: >-
        $CI_PIPELINE_SOURCE == "merge_request_event" &&
        $IS_AIRGAPPED == "false"
      changes:
        - apps/api/**/*

# Shell Executor variant — air-gapped internal GitLab (IS_AIRGAPPED=true)
# Connects to PostgreSQL + Valkey installed locally on the Runner machine
# Runner prerequisite: psql client accessible, plane_user role created
backend:test:shell:
  stage: test
  interruptible: true
  variables:
    POSTGRES_DB: plane_test
    POSTGRES_USER: plane_user
    POSTGRES_PASSWORD: plane_password
    DATABASE_URL: "postgres://plane_user:plane_password@localhost:5432/plane_test"
    REDIS_URL: "redis://localhost:6379/0"
    PIP_CACHE_DIR: .pip-cache
  cache:
    <<: *pip_cache
  script:
    # Recreate test database (ignore error if it already exists)
    - psql -U plane_user -h localhost -c "DROP DATABASE IF EXISTS plane_test;" 2>/dev/null || true
    - psql -U plane_user -h localhost -c "CREATE DATABASE plane_test;" 2>/dev/null || true
    - cd apps/api
    - pip install -r requirements/test.txt
    - python run_tests.py --unit --verbose
  rules:
    - if: >-
        $CI_PIPELINE_SOURCE == "merge_request_event" &&
        $IS_AIRGAPPED == "true"
      changes:
        - apps/api/**/*

# =============================================================================
# STAGE 3: BUILD (3 dynamic images only: web, admin, api)
# Images exported as tar.gz because servers cannot pull from any registry
# =============================================================================

build:web:
  stage: build
  script:
    - docker build -t makeplane/plane-frontend:$IMAGE_TAG -f apps/web/Dockerfile.web .
    - mkdir -p dist
    - docker save makeplane/plane-frontend:$IMAGE_TAG | gzip > dist/plane-frontend-$IMAGE_TAG.tar.gz
  artifacts:
    paths:
      - dist/plane-frontend-*.tar.gz
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "preview"

build:admin:
  stage: build
  script:
    - docker build -t makeplane/plane-admin:$IMAGE_TAG -f apps/admin/Dockerfile.admin .
    - mkdir -p dist
    - docker save makeplane/plane-admin:$IMAGE_TAG | gzip > dist/plane-admin-$IMAGE_TAG.tar.gz
  artifacts:
    paths:
      - dist/plane-admin-*.tar.gz
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "preview"

build:api:
  stage: build
  script:
    # Build context is ./apps/api (not repo root) per Dockerfile.api requirements
    - docker build -t makeplane/plane-backend:$IMAGE_TAG -f apps/api/Dockerfile.api ./apps/api
    - mkdir -p dist
    - docker save makeplane/plane-backend:$IMAGE_TAG | gzip > dist/plane-backend-$IMAGE_TAG.tar.gz
  artifacts:
    paths:
      - dist/plane-backend-*.tar.gz
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "preview"

# =============================================================================
# STAGE 4: DEPLOY
# Deploy strategy: SCP tar.gz + scripts/ci-deploy.sh to server, then SSH execute
# =============================================================================

# ── SSH helper template ───────────────────────────────────────────────────────

.ssh_setup: &ssh_setup
  - eval $(ssh-agent -s)
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh

# ── Deploy Test — auto on merge to develop (air-gapped internal) ──────────────
deploy:test:
  stage: deploy
  interruptible: false
  before_script:
    - *ssh_setup
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - ssh-keyscan -H $TEST_SERVER >> ~/.ssh/known_hosts
  script:
    # Upload images and deploy script to server
    - ssh $SSH_USER@$TEST_SERVER "mkdir -p /tmp/plane-deploy"
    - scp dist/*.tar.gz $SSH_USER@$TEST_SERVER:/tmp/plane-deploy/
    - scp scripts/ci-deploy.sh $SSH_USER@$TEST_SERVER:/tmp/ci-deploy.sh
    # Execute deploy script with IMAGE_TAG exported
    - ssh $SSH_USER@$TEST_SERVER "IMAGE_TAG=$IMAGE_TAG bash /tmp/ci-deploy.sh"
    # Cleanup temp files
    - ssh $SSH_USER@$TEST_SERVER "rm -f /tmp/ci-deploy.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" && $IS_AIRGAPPED == "true"
  environment:
    name: test
    url: https://uat-jms.shinhan.com.vn

# ── Deploy Production — manual approve on merge to preview (air-gapped internal) ──
deploy:production:
  stage: deploy
  interruptible: false
  before_script:
    - *ssh_setup
    - echo "$SSH_PRIVATE_KEY_PROD" | tr -d '\r' | ssh-add -
    - ssh-keyscan -H $PROD_SERVER >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER_PROD@$PROD_SERVER "mkdir -p /tmp/plane-deploy"
    - scp dist/*.tar.gz $SSH_USER_PROD@$PROD_SERVER:/tmp/plane-deploy/
    - scp scripts/ci-deploy.sh $SSH_USER_PROD@$PROD_SERVER:/tmp/ci-deploy.sh
    - ssh $SSH_USER_PROD@$PROD_SERVER "IMAGE_TAG=$IMAGE_TAG bash /tmp/ci-deploy.sh"
    - ssh $SSH_USER_PROD@$PROD_SERVER "rm -f /tmp/ci-deploy.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "preview" && $IS_AIRGAPPED == "true"
      when: manual
      allow_failure: false
  environment:
    name: production
    url: http://10.94.125.86

# ── Deploy External Test — auto on merge to develop (external gitlab.com) ─────
# Uses a temporary VPS as deploy target to validate SSH + SCP flow end-to-end
# Auth: password-based via sshpass (VPS_PASSWORD variable) — no SSH key needed
deploy:external-test:
  stage: deploy
  interruptible: false
  before_script:
    - apt-get update -qq && apt-get install -y -qq sshpass
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
  script:
    - sshpass -p "$VPS_PASSWORD" ssh $VPS_USER@$VPS_HOST "mkdir -p /tmp/plane-deploy"
    - sshpass -p "$VPS_PASSWORD" scp dist/*.tar.gz $VPS_USER@$VPS_HOST:/tmp/plane-deploy/
    - sshpass -p "$VPS_PASSWORD" scp scripts/ci-deploy.sh $VPS_USER@$VPS_HOST:/tmp/ci-deploy.sh
    # VPS uses home-based path (no sudo); internal servers use default /root/Documents/... path
    - sshpass -p "$VPS_PASSWORD" ssh $VPS_USER@$VPS_HOST "PLANE_DIR=/home/$VPS_USER/plane-app IMAGE_TAG=$IMAGE_TAG bash /tmp/ci-deploy.sh"
    - sshpass -p "$VPS_PASSWORD" ssh $VPS_USER@$VPS_HOST "rm -f /tmp/ci-deploy.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" && $IS_AIRGAPPED == "false"
  environment:
    name: external-test
    url: http://$VPS_HOST
