<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corporate Telegram Web Messenger</title>
  <style>
    :root {
      --bg-page: #eef2f7;
      --bg-shell: #ffffff;
      --bg-sidebar: rgba(248, 250, 252, 0.96);
      --bg-panel: #ffffff;
      --bg-chat: radial-gradient(circle at top, rgba(14, 165, 233, 0.12), transparent 30%), linear-gradient(135deg, #f8fafc, #eef4fb);
      --bg-input: #f8fafc;
      --bg-soft: #f1f5f9;
      --bg-hover: #eaf3fb;
      --bg-active: #229ed9;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-soft: #94a3b8;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --accent: #229ed9;
      --accent-2: #0ea5e9;
      --danger: #ef4444;
      --warning: #f59e0b;
      --ok: #10b981;
      --bubble-in: rgba(255, 255, 255, 0.95);
      --bubble-out: #229ed9;
      --bubble-out-text: #ffffff;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius-xl: 28px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.dark {
      --bg-page: #020617;
      --bg-shell: #020617;
      --bg-sidebar: rgba(15, 23, 42, 0.96);
      --bg-panel: #020617;
      --bg-chat: radial-gradient(circle at top, rgba(14, 165, 233, 0.12), transparent 32%), linear-gradient(135deg, #020617, #0f172a);
      --bg-input: #0f172a;
      --bg-soft: #111c2f;
      --bg-hover: #17233a;
      --bg-active: #229ed9;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-soft: #64748b;
      --border: #1e293b;
      --border-strong: #334155;
      --bubble-in: rgba(15, 23, 42, 0.96);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 12px 32px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body {
      overflow: hidden;
      background: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font);
      transition: background 0.25s ease, color 0.25s ease;
    }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    input, textarea, select { color: var(--text-main); }

    .app { height: 100vh; padding: 12px; background: var(--bg-page); transition: background 0.25s ease; }
    .shell {
      display: flex;
      position: relative;
      width: min(1480px, 100%);
      height: calc(100vh - 24px);
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius-xl);
      background: var(--bg-shell);
      box-shadow: var(--shadow);
    }
    body.dark .shell { border-color: var(--border); }

    .sidebar {
      display: flex;
      flex: 0 0 360px;
      width: 360px;
      min-width: 360px;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg-sidebar);
      transition: margin-left 0.28s ease, background 0.25s ease, border-color 0.25s ease;
    }
    .shell.sidebar-collapsed .sidebar { margin-left: -360px; }
    .sidebar-header { border-bottom: 1px solid var(--border); padding: 16px; transition: border-color 0.25s ease; }
    .top-row { display: flex; align-items: center; gap: 12px; }

    .icon-btn {
      display: grid;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--accent); }
    .icon-btn:active { transform: scale(0.96); }
    .icon { width: 20px; height: 20px; display: block; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .tiny-icon { width: 14px; height: 14px; flex: 0 0 auto; }

    .search-box { position: relative; flex: 1; }
    .search-box .icon { position: absolute; left: 13px; top: 50%; width: 17px; height: 17px; transform: translateY(-50%); color: var(--text-soft); pointer-events: none; }
    .search-box input {
      width: 100%; height: 42px; border: 1px solid transparent; border-radius: 999px; outline: none;
      background: var(--bg-soft); color: var(--text-main); padding: 0 42px; font-size: 14px;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .search-box input:focus { border-color: rgba(14, 165, 233, 0.45); background: var(--bg-panel); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.12); }
    .clear-search { position: absolute; top: 50%; right: 8px; display: none; width: 28px; height: 28px; transform: translateY(-50%); border-radius: 999px; background: transparent; color: var(--text-soft); }
    .clear-search.show { display: grid; place-items: center; }
    .clear-search:hover { background: var(--bg-hover); color: var(--text-main); }

    .tabs { display: flex; gap: 8px; margin-top: 14px; overflow-x: auto; padding-bottom: 2px; }
    .tab { flex: 0 0 auto; border-radius: 999px; background: var(--bg-panel); color: var(--text-muted); padding: 9px 14px; font-size: 13px; transition: background 0.18s ease, color 0.18s ease; }
    .tab.active { background: rgba(14, 165, 233, 0.13); color: var(--accent); font-weight: 650; }
    .tab:hover { background: var(--bg-hover); color: var(--accent); }

    .chat-list { flex: 1; min-height: 0; overflow-y: auto; padding: 8px; }
    .chat-list::-webkit-scrollbar, .messages::-webkit-scrollbar, .details-body::-webkit-scrollbar, .tabs::-webkit-scrollbar, .quick-actions::-webkit-scrollbar { width: 7px; height: 7px; }
    .chat-list::-webkit-scrollbar-thumb, .messages::-webkit-scrollbar-thumb, .details-body::-webkit-scrollbar-thumb, .tabs::-webkit-scrollbar-thumb, .quick-actions::-webkit-scrollbar-thumb { border-radius: 999px; background: rgba(100, 116, 139, 0.25); }

    .chat-item {
      position: relative;
      display: flex; width: 100%; align-items: center; gap: 12px; border-radius: 18px; background: transparent; color: var(--text-main);
      padding: 12px; text-align: left; transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      cursor: pointer;
    }
    .chat-item:hover { background: var(--bg-panel); box-shadow: var(--shadow-soft); }
    .chat-item.active { background: var(--bg-active); color: #ffffff; box-shadow: 0 12px 34px rgba(34, 158, 217, 0.24); }
    .chat-item.archived { opacity: 0.72; }
    .chat-item.blocked { opacity: 0.58; }
    .chat-more-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: none;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      color: var(--text-muted);
      box-shadow: 0 8px 18px rgba(15,23,42,0.10);
    }
    body.dark .chat-more-btn { background: rgba(15,23,42,0.82); }
    .chat-item:hover .chat-more-btn, .chat-more-btn:focus { display: grid; }
    .chat-item.active .chat-more-btn { background: rgba(255,255,255,0.18); color: #ffffff; }
    .chat-status-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(239,68,68,0.12);
      color: var(--danger);
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.5;
    }
    .chat-item.active .chat-status-tag { background: rgba(255,255,255,0.18); color: #ffffff; }

    .avatar { position: relative; display: grid; width: 46px; height: 46px; flex: 0 0 auto; place-items: center; border-radius: 999px; color: #ffffff; font-size: 13px; font-weight: 750; letter-spacing: 0.02em; box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12); }
    .avatar.large { width: 68px; height: 68px; font-size: 18px; }
    .avatar.blue { background: linear-gradient(135deg, #2563eb, #22d3ee); }
    .avatar.green { background: linear-gradient(135deg, #059669, #2dd4bf); }
    .avatar.violet { background: linear-gradient(135deg, #7c3aed, #6366f1); }
    .avatar.rose { background: linear-gradient(135deg, #e11d48, #fb923c); }
    .avatar.slate { background: linear-gradient(135deg, #334155, #94a3b8); }
    .avatar.red { background: linear-gradient(135deg, #ef4444, #f59e0b); }
    .avatar.amber { background: linear-gradient(135deg, #f59e0b, #f97316); }
    .online-dot { position: absolute; right: 0; bottom: 0; width: 13px; height: 13px; border: 2px solid var(--bg-sidebar); border-radius: 999px; background: var(--ok); }

    .chat-meta { flex: 1; min-width: 0; }
    .chat-title-row, .chat-sub-row, .message-meta, .status-line { display: flex; align-items: center; }
    .chat-title-row { gap: 6px; }
    .chat-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; font-weight: 700; }
    .chat-item:not(.active) .tiny-icon { color: var(--text-soft); }
    .chat-sub-row { gap: 6px; margin-top: 5px; color: var(--text-muted); font-size: 12px; }
    .chat-item.active .chat-sub-row, .chat-item.active .chat-time { color: rgba(255, 255, 255, 0.86); }
    .chat-subtitle { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-side { display: flex; flex: 0 0 auto; align-items: flex-end; flex-direction: column; gap: 8px; }
    .chat-time { color: var(--text-soft); font-size: 12px; }
    .badge { display: grid; min-width: 21px; height: 21px; place-items: center; border-radius: 999px; background: var(--accent); color: #ffffff; font-size: 11px; font-weight: 800; padding: 0 6px; }
    .chat-item.active .badge { background: #ffffff; color: var(--accent); }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 12px; }

    .primary-btn { display: flex; width: 100%; align-items: center; justify-content: center; gap: 8px; border-radius: 18px; background: var(--text-main); color: var(--bg-shell); padding: 13px 16px; font-size: 14px; font-weight: 750; transition: transform 0.18s ease, opacity 0.18s ease; }
    .primary-btn:hover { opacity: 0.9; }
    .primary-btn:active { transform: scale(0.98); }

    .main { position: relative; display: flex; min-width: 0; flex: 1; flex-direction: column; background: var(--bg-chat); transition: background 0.25s ease; }
    .main-header { display: flex; height: 68px; flex: 0 0 68px; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.72); background: rgba(255,255,255,0.82); padding: 0 16px; backdrop-filter: blur(18px); transition: background 0.25s ease, border-color 0.25s ease; z-index: 8; }
    body.dark .main-header { border-color: var(--border); background: rgba(2,6,23,0.82); }
    .conversation-target { display: flex; min-width: 0; align-items: center; gap: 12px; border-radius: 18px; background: transparent; color: var(--text-main); padding: 6px 10px 6px 4px; text-align: left; transition: background 0.18s ease; }
    .conversation-target:hover { background: var(--bg-hover); }
    .conversation-text { min-width: 0; }
    .conversation-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; font-weight: 750; }
    .conversation-status { margin-top: 2px; overflow: hidden; color: var(--text-muted); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .header-left, .header-actions { display: flex; min-width: 0; align-items: center; gap: 8px; }
    .theme-btn { background: var(--bg-soft); color: var(--text-muted); }

    .selection-bar { display: none; height: 54px; flex: 0 0 54px; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.9); padding: 0 16px; backdrop-filter: blur(18px); z-index: 7; }
    body.dark .selection-bar { background: rgba(2,6,23,0.9); }
    .shell.selecting .selection-bar { display: flex; }
    .selection-left, .selection-actions { display: flex; align-items: center; gap: 8px; }
    .selection-count { font-size: 14px; font-weight: 800; }
    .danger-btn:hover { color: var(--danger); }

    .pinned-bar { display: none; flex: 0 0 auto; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.78); padding: 8px 18px; backdrop-filter: blur(14px); z-index: 5; }
    body.dark .pinned-bar { background: rgba(2,6,23,0.78); }
    .pinned-bar.show { display: flex; }
    .pin-line { width: 3px; height: 32px; border-radius: 999px; background: var(--accent); }
    .pinned-text { min-width: 0; flex: 1; }
    .pinned-title { font-size: 12px; font-weight: 800; color: var(--accent); }
    .pinned-sub { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); font-size: 12px; }

    .messages { min-height: 0; flex: 1; overflow-y: auto; padding: 24px 16px; scroll-behavior: smooth; }
    .messages-inner { display: flex; width: min(780px, 100%); margin: 0 auto; flex-direction: column; gap: 10px; }
    .date-chip, .unread-marker { align-self: center; border: 1px solid rgba(255,255,255,0.74); border-radius: 999px; background: rgba(255,255,255,0.82); color: var(--text-muted); padding: 5px 12px; font-size: 12px; font-weight: 650; box-shadow: 0 6px 18px rgba(15,23,42,0.07); backdrop-filter: blur(12px); }
    body.dark .date-chip, body.dark .unread-marker { border-color: var(--border); background: rgba(15,23,42,0.84); }
    .unread-marker { width: 100%; text-align: center; color: var(--accent); border-color: rgba(14,165,233,0.25); }

    .message-row { display: flex; position: relative; width: 100%; align-items: flex-end; gap: 8px; }
    .message-row.mine { justify-content: flex-end; }
    .message-row.theirs { justify-content: flex-start; }
    .message-row.selected .bubble { outline: 3px solid rgba(14,165,233,0.28); }
    .message-row.highlight .bubble { animation: flash 1.2s ease; }
    @keyframes flash { 0%,100% { box-shadow: var(--shadow-soft); } 35% { box-shadow: 0 0 0 5px rgba(14,165,233,0.24), var(--shadow-soft); } }

    .select-dot { display: none; width: 24px; height: 24px; flex: 0 0 auto; border: 2px solid var(--border-strong); border-radius: 999px; background: var(--bg-panel); }
    .shell.selecting .select-dot { display: grid; place-items: center; }
    .message-row.selected .select-dot { border-color: var(--accent); background: var(--accent); color: white; }
    .message-row.selected .select-dot::after { content: "✓"; font-size: 13px; font-weight: 900; }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 76%; }
    .message-row.mine .bubble-wrap { align-items: flex-end; }
    .message-row.theirs .bubble-wrap { align-items: flex-start; }
    .bubble { position: relative; width: fit-content; max-width: 100%; border-radius: 22px; padding: 10px 12px 7px; font-size: 14px; line-height: 1.55; box-shadow: var(--shadow-soft); word-wrap: break-word; }
    .message-row.theirs .bubble { border-bottom-left-radius: 6px; border: 1px solid rgba(255,255,255,0.72); background: var(--bubble-in); color: var(--text-main); }
    body.dark .message-row.theirs .bubble { border-color: var(--border); }
    .message-row.mine .bubble { border-bottom-right-radius: 6px; background: var(--bubble-out); color: var(--bubble-out-text); box-shadow: 0 12px 30px rgba(34,158,217,0.22); }
    .bubble-menu-btn { position: absolute; top: 6px; right: 6px; display: none; width: 26px; height: 26px; place-items: center; border-radius: 999px; background: rgba(15,23,42,0.08); color: inherit; }
    .message-row.mine .bubble-menu-btn { background: rgba(255,255,255,0.14); }
    .bubble:hover .bubble-menu-btn { display: grid; }

    .author { margin-bottom: 2px; color: var(--accent); font-size: 12px; font-weight: 800; }
    .message-text { white-space: pre-wrap; padding-right: 4px; }
    .forward-badge, .reply-quote { border-left: 3px solid rgba(14,165,233,0.7); margin-bottom: 7px; padding: 5px 8px; border-radius: 9px; background: rgba(14,165,233,0.08); font-size: 12px; }
    .message-row.mine .forward-badge, .message-row.mine .reply-quote { border-left-color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.12); }
    .quote-author { display: block; font-weight: 800; color: var(--accent); }
    .message-row.mine .quote-author { color: #dff5ff; }
    .quote-text { display: block; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.84; }

    .attachment { display: flex; width: 100%; align-items: center; gap: 10px; margin-top: 10px; border: 1px solid var(--border); border-radius: 15px; background: var(--bg-soft); color: inherit; padding: 9px 10px; text-align: left; transition: background 0.18s ease, transform 0.18s ease; }
    .message-row.mine .attachment { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.14); }
    .attachment:hover { transform: translateY(-1px); }
    .attachment-preview { width: 44px; height: 44px; object-fit: cover; border-radius: 12px; background: rgba(15,23,42,0.1); }
    .attachment-info { min-width: 0; flex: 1; }
    .attachment-name { display: block; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 800; }
    .attachment-size { display: block; margin-top: 2px; opacity: 0.72; font-size: 11px; }

    .message-meta { justify-content: flex-end; gap: 5px; margin-top: 2px; color: var(--text-soft); font-size: 11px; }
    .message-row.mine .message-meta { color: rgba(255,255,255,0.82); }
    .edited { opacity: 0.75; }
    .ticks { display: inline-flex; align-items: center; color: inherit; font-size: 13px; letter-spacing: -4px; padding-right: 4px; cursor: help; }
    .ticks.read { color: #bfeaff; }
    .read-at { cursor: help; }

    .reactions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; padding: 0 2px; }
    .reaction-chip { display: inline-flex; align-items: center; gap: 4px; border: 1px solid rgba(14,165,233,0.18); border-radius: 999px; background: rgba(255,255,255,0.88); color: var(--text-main); padding: 3px 7px; font-size: 12px; line-height: 1; box-shadow: 0 6px 14px rgba(15,23,42,0.07); }
    body.dark .reaction-chip { background: rgba(15,23,42,0.92); color: var(--text-main); }
    .reaction-chip.mine { border-color: var(--accent); color: var(--accent); }

    .typing { display: flex; align-self: flex-start; align-items: center; gap: 9px; border: 1px solid rgba(255,255,255,0.72); border-radius: 999px; background: rgba(255,255,255,0.82); color: var(--text-muted); padding: 8px 13px; font-size: 12px; box-shadow: var(--shadow-soft); backdrop-filter: blur(12px); }
    body.dark .typing { border-color: var(--border); background: rgba(15,23,42,0.88); }
    .dots { display: flex; gap: 4px; }
    .dots span { width: 6px; height: 6px; border-radius: 999px; background: var(--text-soft); animation: bounce 1s infinite ease-in-out; }
    .dots span:nth-child(2) { animation-delay: 0.12s; }
    .dots span:nth-child(3) { animation-delay: 0.24s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.45; } 40% { transform: translateY(-4px); opacity: 1; } }

    .composer-wrap { flex: 0 0 auto; border-top: 1px solid rgba(255,255,255,0.72); background: rgba(255,255,255,0.82); padding: 12px 16px 16px; backdrop-filter: blur(18px); z-index: 6; }
    body.dark .composer-wrap { border-color: var(--border); background: rgba(2,6,23,0.88); }
    .composer-inner { width: min(780px, 100%); margin: 0 auto; }
    .composer-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .quick-actions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 1px; }
    .quick-action { display: flex; flex: 0 0 auto; align-items: center; gap: 7px; border: 1px solid var(--border); border-radius: 999px; background: var(--bg-panel); color: var(--text-muted); padding: 7px 11px; font-size: 12px; transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease; }
    .quick-action:hover { border-color: rgba(14,165,233,0.32); background: rgba(14,165,233,0.09); color: var(--accent); }
    .notice { flex: 0 0 auto; border-radius: 999px; background: var(--bg-soft); color: var(--text-muted); padding: 7px 12px; font-size: 12px; white-space: nowrap; }

    .compose-state { display: none; align-items: center; gap: 10px; border-left: 3px solid var(--accent); border-radius: 14px; background: var(--bg-soft); margin-bottom: 8px; padding: 9px 10px; }
    .compose-state.show { display: flex; }
    .compose-state-text { flex: 1; min-width: 0; }
    .compose-state-title { display: block; color: var(--accent); font-size: 12px; font-weight: 850; }
    .compose-state-sub { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); font-size: 12px; }

    .file-preview { display: none; gap: 8px; overflow-x: auto; margin-bottom: 8px; }
    .file-preview.show { display: flex; }
    .pending-file { display: flex; align-items: center; gap: 8px; min-width: 190px; max-width: 250px; border: 1px solid var(--border); border-radius: 16px; background: var(--bg-panel); padding: 8px; }
    .pending-thumb { width: 38px; height: 38px; object-fit: cover; border-radius: 11px; background: var(--bg-soft); }
    .pending-info { min-width: 0; flex: 1; }
    .pending-name { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 800; }
    .pending-size { display: block; color: var(--text-muted); font-size: 11px; }
    .remove-file { display: grid; width: 24px; height: 24px; place-items: center; border-radius: 999px; background: var(--bg-soft); color: var(--text-muted); }

    .composer { display: flex; align-items: flex-end; gap: 8px; border: 1px solid var(--border); border-radius: 24px; background: var(--bg-input); padding: 8px; box-shadow: var(--shadow-soft); transition: border-color 0.18s ease, box-shadow 0.18s ease; }
    .composer:focus-within { border-color: rgba(14,165,233,0.48); box-shadow: 0 0 0 4px rgba(14,165,233,0.12); }

        const msg = getMessage(state.editingMessageId);
        if (msg && msg.mine && text) { msg.text = text; msg.edited = true; msg.time = nowTime(); }
        state.editingMessageId = null; draftInput.value = ""; resizeTextarea(); renderAll(); showNotice("Сообщение изменено"); return;
      }
      if (!text && !state.pendingFiles.length) { showNotice("Голосовое сообщение: заглушка"); return; }
      const reply = state.replyToId ? getMessage(state.replyToId) : null;
      const next = { id: Date.now(), author: "You", text, time: nowTime(), mine: true, status: "sent", readAt: null, unread: false, attachment: state.pendingFiles.map(file => ({ ...file })), reactions: {}, myReactions: [], replyTo: reply ? { id: reply.id, author: reply.author, text: textPreview(reply) } : null };
      messages[chat.id] = [...(messages[chat.id] || []), next];
      chat.subtitle = text ? "You: " + text : "You отправил(а) файл";
      chat.time = next.time;
      state.replyToId = null;
      state.pendingFiles = [];
      draftInput.value = "";
      resizeTextarea();
      renderAll();
      showNotice("Сообщение отправлено локально");
      setTimeout(() => updateMessageStatus(chat.id, next.id, "delivered"), 900);
      setTimeout(() => updateMessageStatus(chat.id, next.id, "read"), 2200);
    }

    function updateMessageStatus(chatId, messageId, status) {
      const msg = getMessage(messageId, chatId);
      if (!msg) return;
      msg.status = status;
      if (status === "read") msg.readAt = nowTime();
      if (chatId === state.selectedId) renderMessages();
    }

    function addIncomingMessage(chatId = state.selectedId) {
      const chat = getChat(chatId);
      const authors = chat.type === "group" ? ["Elena", "Maksim", "Ira"] : [chat.name];
      const author = authors[Math.floor(Math.random() * authors.length)];
      const textPool = ["Принял, смотрю детали.", "Добавил комментарий к последнему пункту.", "Нужно еще проверить сроки и зависимости.", "Отправлю обновление через несколько минут."];
      const msg = { id: Date.now(), author, text: textPool[Math.floor(Math.random() * textPool.length)], time: nowTime(), mine: false, status: "delivered", readAt: null, unread: true, reactions: {}, myReactions: [] };
      messages[chatId] = [...(messages[chatId] || []), msg];
      chat.subtitle = `${author}: ${msg.text}`;
      chat.time = msg.time;
      chat.unread += 1;
      renderAll();
      showNotice("Новое входящее сообщение");
    }

    function openMessageMenu(messageId, x, y) {
      const msg = getMessage(messageId);
      if (!msg) return;
      state.contextMessageId = String(messageId);
      const isPinned = getChat().pinnedMessageId && String(getChat().pinnedMessageId) === String(messageId);
      contextMenu.innerHTML = `<div class="emoji-line">${["👍","❤️","🔥","👏","😮","✅"].map(e => `<button class="emoji-btn" data-react-message="${messageId}" data-emoji="${e}">${e}</button>`).join("")}</div><div class="menu-sep"></div>
        <button class="menu-row" data-menu-action="reply">${icon("reply")} Ответить</button>
        ${msg.mine ? `<button class="menu-row" data-menu-action="edit">${icon("edit")} Редактировать</button>` : ""}
        <button class="menu-row" data-menu-action="forward">${icon("forward")} Переслать</button>
        <button class="menu-row" data-menu-action="copy">${icon("copy")} Копировать текст</button>
        <button class="menu-row" data-menu-action="pin">${icon("pin")} ${isPinned ? "Открепить" : "Закрепить"}</button>
        <button class="menu-row" data-menu-action="select">${icon("check")} Выбрать</button>
        <div class="context-read">${msg.mine ? (msg.readAt ? `Прочитано в ${escapeHtml(msg.readAt)}` : msg.status === "delivered" ? "Доставлено" : "Отправлено") : (msg.readAt ? `Вы прочитали в ${escapeHtml(msg.readAt)}` : "Еще не прочитано")}</div>
        <div class="menu-sep"></div><button class="menu-row danger" data-menu-action="delete">${icon("trash")} Удалить</button>`;
      placePopover(contextMenu, x, y);
    }

    function placePopover(el, x, y) {
      hidePopovers(el);
      el.classList.remove("hidden");
      const rect = el.getBoundingClientRect();
      el.style.left = Math.min(x, window.innerWidth - rect.width - 10) + "px";
      el.style.top = Math.min(y, window.innerHeight - rect.height - 10) + "px";
    }

    function hidePopovers(except = null) { [contextMenu, mainMenu, chatMenu, emojiPopover].forEach(el => { if (el !== except) el.classList.add("hidden"); }); }

    function handleMessageAction(action) {
      const id = state.contextMessageId;
      const msg = getMessage(id);
      if (!msg) return;
      if (action === "reply") { state.replyToId = id; state.editingMessageId = null; renderComposeState(); draftInput.focus(); }
      if (action === "edit") { if (!msg.mine) return; state.editingMessageId = id; state.replyToId = null; draftInput.value = msg.text || ""; resizeTextarea(); renderComposeState(); updateSendButton(); draftInput.focus(); }
      if (action === "forward") openForwardModal([id]);
      if (action === "copy") copyText(textPreview(msg));
      if (action === "pin") togglePin(id);
      if (action === "select") { state.selectMode = true; state.selectedMessages.add(String(id)); renderAll(); }
      if (action === "delete") deleteMessages([id]);
      hidePopovers();
    }

    function toggleReaction(messageId, emoji) {
      const msg = getMessage(messageId);
      if (!msg) return;
      msg.reactions ||= {};
      msg.myReactions ||= [];
      if (msg.myReactions.includes(emoji)) { msg.myReactions = msg.myReactions.filter(e => e !== emoji); msg.reactions[emoji] = Math.max(0, (msg.reactions[emoji] || 1) - 1); }
      else { msg.myReactions.push(emoji); msg.reactions[emoji] = (msg.reactions[emoji] || 0) + 1; }
      renderMessages();
      hidePopovers();
    }

    function togglePin(messageId) {
      const chat = getChat();
      chat.pinnedMessageId = String(chat.pinnedMessageId) === String(messageId) ? null : messageId;
      (messages[chat.id] || []).forEach(m => m.pinned = String(m.id) === String(chat.pinnedMessageId));
      renderPinned(); renderMessages(); renderDetails(); showNotice(chat.pinnedMessageId ? "Сообщение закреплено" : "Сообщение откреплено");
    }

    function deleteMessages(ids) {
      const chat = getChat();
      const set = new Set(ids.map(String));
      messages[chat.id] = (messages[chat.id] || []).filter(msg => !set.has(String(msg.id)));
      if (chat.pinnedMessageId && set.has(String(chat.pinnedMessageId))) chat.pinnedMessageId = null;
      state.selectedMessages.clear(); state.selectMode = false;
      renderAll(); showNotice("Сообщения удалены");
    }

    function toggleMessageSelection(id) {
      const sid = String(id);
      if (state.selectedMessages.has(sid)) state.selectedMessages.delete(sid); else state.selectedMessages.add(sid);
      state.selectMode = state.selectedMessages.size > 0;
      renderAll();
    }

    function copyText(text) {
      const fallback = () => { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); };
      if (navigator.clipboard) navigator.clipboard.writeText(text).catch(fallback); else fallback();
      showNotice("Скопировано");
    }

    function copySelected() {
      const selected = [...state.selectedMessages].map(id => getMessage(id)).filter(Boolean);
      if (!selected.length) return;
      copyText(selected.map(m => `${m.author}: ${textPreview(m)}`).join("\n"));
    }

    function openForwardModal(ids) {
      state.forwardIds = ids.map(String);
      forwardTargets.innerHTML = chats.filter(c => c.id !== state.selectedId).map(chat => `<button class="forward-target" data-forward-target="${chat.id}">${avatarHtml(chat)}<span><strong>${escapeHtml(chat.name)}</strong><br><span style="color:var(--text-muted);font-size:12px">${chat.archived ? "Архив" : "Активный чат"}</span></span></button>`).join("");
      forwardModal.classList.add("show");
    }

    function forwardToChat(chatId) {
      const target = getChat(chatId);
      const sourceChat = getChat();
      const selected = state.forwardIds.map(id => getMessage(id)).filter(Boolean);
      selected.forEach(src => {
        const copy = { ...src, id: Date.now() + Math.random(), mine: true, author: "You", time: nowTime(), status: "sent", readAt: null, unread: false, forwardedFrom: src.author || sourceChat.name, reactions: {}, myReactions: [], replyTo: null, pinned: false };
        messages[target.id] = [...(messages[target.id] || []), copy];
      });
      target.subtitle = `You переслал(а) ${selected.length} сообщ.`;
      target.time = nowTime();
      state.forwardIds = [];
      state.selectedMessages.clear(); state.selectMode = false;
      forwardModal.classList.remove("show");
      renderAll(); showNotice(`Переслано в «${target.name}»`);
    }

    function handleFiles(fileList) {
      [...fileList].forEach(file => {
        const item = { name: file.name, size: file.size, type: file.type || "application/octet-stream", url: file.type.startsWith("image/") ? URL.createObjectURL(file) : "" };
        state.pendingFiles.push(item);
      });
      renderPendingFiles(); updateSendButton(); showNotice(`Файлов добавлено: ${fileList.length}`);
      fileInput.value = ""; mediaInput.value = "";
    }

    function toggleMute(chatId = state.selectedId) { const chat = getChat(chatId); chat.muted = !chat.muted; renderAll(); showNotice(chat.muted ? "Уведомления отключены" : "Уведомления включены"); }
    function toggleArchive(chatId = state.selectedId) { const chat = getChat(chatId); chat.archived = !chat.archived; chat.category = chat.archived ? "archive" : "work"; renderAll(); showNotice(chat.archived ? "Чат перемещен в архив" : "Чат возвращен из архива"); }
    function toggleChatPin(chatId = state.selectedId) { const chat = getChat(chatId); chat.pinned = !chat.pinned; renderAll(); showNotice(chat.pinned ? "Чат закреплен" : "Чат откреплен"); }
    function toggleBlock(chatId = state.selectedId) { const chat = getChat(chatId); chat.blocked = !chat.blocked; if (chat.blocked) { chat.muted = true; chat.unread = 0; (messages[chat.id] || []).forEach(message => { if (!message.mine && message.unread) { message.unread = false; message.readAt = nowTime(); } }); } renderAll(); showNotice(chat.blocked ? "Пользователь заблокирован" : "Пользователь разблокирован"); }
    function openNewChatModal() {
      const currentUserLink = `https://t.me/corporate_${String(state.selectedId || "user").replace(/[^a-z0-9_-]/gi, "")}`;
      userChatLink.value = currentUserLink;
      const groups = ["Друзья", "Команда", "Подчиненные", "Боты"];
      contactTargets.innerHTML = groups.map(group => {
        const items = contacts.filter(contact => contact.group === group);
        if (!items.length) return "";
        return `<div class="contact-group-title">${escapeHtml(group)}</div>` + items.map(contact => `<button class="contact-row" data-start-chat="${contact.id}">${avatarHtml(contact)}<span class="contact-meta"><span class="contact-name">${escapeHtml(contact.name)}</span><span class="contact-role">${escapeHtml(contact.role)}</span></span></button>`).join("");
      }).join("");
      newChatModal.classList.add("show");
    }

    function createChat(contactId) {
      const contact = contacts.find(item => item.id === contactId);
      if (!contact) return;
      const existing = chats.find(chat => chat.contactId === contact.id);
      if (existing) {
        state.selectedId = existing.id;
        newChatModal.classList.remove("show");
        renderAll();
        showNotice(`Открыт существующий чат с «${existing.name}»`);
        return;
      }
      const id = "chat-" + contact.id + "-" + Date.now();
      chats.unshift({ id, contactId: contact.id, name: contact.name, subtitle: "Пустой диалог", time: nowTime(), unread: 0, pinned: false, online: contact.online, muted: false, blocked: false, type: contact.type, avatar: contact.avatar, color: contact.color, category: "work", archived: false, pinnedMessageId: null });
      messages[id] = [];
      state.selectedId = id;
      newChatModal.classList.remove("show");
      renderAll();
      showNotice(`Создан чат с «${contact.name}»`);
    }

    function deleteCurrentChat(chatId = state.selectedId) {
      if (chats.length <= 1) { showNotice("Последний чат нельзя удалить в демо"); return; }
      const chat = getChat(chatId);
      const index = chats.findIndex(item => item.id === chat.id);
      if (index < 0) return;
      deleteChatWithUndo(chat.id);
    }

    function deleteChatWithUndo(chatId) {
      if (state.deletedChatDraft?.timer) clearTimeout(state.deletedChatDraft.timer);
      const index = chats.findIndex(item => item.id === chatId);
      if (index < 0) return;
      const chat = chats[index];
      const messageDraft = messages[chat.id] ? [...messages[chat.id]] : [];
      const next = chats[index + 1] || chats[index - 1];
      chats.splice(index, 1);
      delete messages[chat.id];
      if (state.selectedId === chat.id && next) state.selectedId = next.id;
      state.selectedMessages.clear();
      state.selectMode = false;
      state.replyToId = null;
      state.editingMessageId = null;
      renderAll();
      showUndoDelete(chat, messageDraft, index);
    }

    function showUndoDelete(chat, messageDraft, index) {
      undoToastText.textContent = `Чат «${chat.name}» удален`;
      undoToast.classList.add("show");
      undoToastProgress.style.animation = "none";
      undoToastProgress.offsetHeight;
      undoToastProgress.style.animation = "undoProgress 4s linear forwards";
      const timer = setTimeout(() => finalizeDeleteChat(), 4000);
      state.deletedChatDraft = { chat, messages: messageDraft, index, timer };
    }

    function restoreDeletedChat() {
      const draft = state.deletedChatDraft;
      if (!draft) return;
      clearTimeout(draft.timer);
      chats.splice(Math.min(draft.index, chats.length), 0, draft.chat);
      messages[draft.chat.id] = draft.messages;
      state.selectedId = draft.chat.id;
      state.deletedChatDraft = null;
      undoToast.classList.remove("show");
      renderAll();
      showNotice("Удаление отменено");
    }

    function finalizeDeleteChat() {
      state.deletedChatDraft = null;
      undoToast.classList.remove("show");
      showNotice("Чат удален окончательно в локальном состоянии");
    }

    function openChatMenu(chatId, x, y) {
      const chat = getChat(chatId);
      state.contextChatId = chat.id;
      chatMenu.innerHTML = `<button class="menu-row" data-chat-action="pin">${icon("pin")} ${chat.pinned ? "Открепить чат" : "Закрепить чат"}</button><button class="menu-row" data-chat-action="mute">${icon("bell")} ${chat.muted ? "Включить уведомления" : "Выключить уведомления"}</button><button class="menu-row" data-chat-action="archive">${icon("archive")} ${chat.archived ? "Вернуть из архива" : "Архивировать"}</button><button class="menu-row" data-chat-action="block">${icon("block")} ${chat.blocked ? "Разблокировать" : "Заблокировать"}</button><div class="menu-sep"></div><button class="menu-row danger" data-chat-action="delete">${icon("trash")} Удалить чат</button>`;
      placePopover(chatMenu, x, y);
    }

    function handleChatAction(action) {
      const chatId = state.contextChatId;
      if (!chatId) return;
      if (action === "pin") toggleChatPin(chatId);
      if (action === "mute") toggleMute(chatId);
      if (action === "archive") toggleArchive(chatId);
      if (action === "block") toggleBlock(chatId);
      if (action === "delete") deleteCurrentChat(chatId);
      hidePopovers();
    }

    function openMainMenu(x, y) {
      const chat = getChat();
      mainMenu.innerHTML = `<button class="menu-row" data-main-action="new">${icon("edit")} Новый чат</button><button class="menu-row" data-main-action="markRead">${icon("check")} Отметить как прочитанное</button><button class="menu-row" data-main-action="pinChat">${icon("pin")} ${chat.pinned ? "Открепить чат" : "Закрепить чат"}</button><button class="menu-row" data-main-action="mute">${icon("bell")} ${chat.muted ? "Включить уведомления" : "Выключить уведомления"}</button><button class="menu-row" data-main-action="archive">${icon("archive")} ${chat.archived ? "Вернуть из архива" : "Архивировать"}</button><button class="menu-row" data-main-action="block">${icon("block")} ${chat.blocked ? "Разблокировать" : "Заблокировать"}</button><button class="menu-row danger" data-main-action="deleteChat">${icon("trash")} Удалить чат</button><div class="menu-sep"></div><button class="menu-row" data-main-action="theme">${state.dark ? icon("sun") : icon("moon")} Сменить тему</button>`;
      placePopover(mainMenu, x, y);
    }

    document.addEventListener("click", event => {
      const chatMenuBtn = event.target.closest("[data-open-chat-menu]");
      if (chatMenuBtn) { event.stopPropagation(); const rect = chatMenuBtn.getBoundingClientRect(); openChatMenu(chatMenuBtn.dataset.openChatMenu, rect.left - 190, rect.bottom + 6); return; }

      const chatButton = event.target.closest("[data-chat-id]");
      if (chatButton) { state.selectedId = chatButton.dataset.chatId; state.selectedMessages.clear(); state.selectMode = false; state.replyToId = null; state.editingMessageId = null; if (window.innerWidth <= 820) state.sidebarOpen = false; renderAll(); return; }

      const menuBtn = event.target.closest("[data-open-message-menu]");
      if (menuBtn) { event.stopPropagation(); const rect = menuBtn.getBoundingClientRect(); openMessageMenu(menuBtn.dataset.openMessageMenu, rect.left, rect.bottom + 6); return; }

      const selectBtn = event.target.closest("[data-select-message]");
      if (selectBtn) { event.stopPropagation(); toggleMessageSelection(selectBtn.dataset.selectMessage); return; }

      const bubble = event.target.closest("[data-message-bubble]");
      if (bubble && state.selectMode) { toggleMessageSelection(bubble.dataset.messageBubble); return; }

      const scrollTarget = event.target.closest("[data-scroll-message]");
      if (scrollTarget) { const row = document.querySelector(`[data-message-id="${scrollTarget.dataset.scrollMessage}"]`); if (row) { row.scrollIntoView({ behavior: "smooth", block: "center" }); row.classList.add("highlight"); setTimeout(() => row.classList.remove("highlight"), 1300); } return; }

      const reaction = event.target.closest("[data-react-message]");
      if (reaction) { toggleReaction(reaction.dataset.reactMessage, reaction.dataset.emoji); return; }

      const menuAction = event.target.closest("[data-menu-action]");
      if (menuAction) { handleMessageAction(menuAction.dataset.menuAction); return; }

      const mainAction = event.target.closest("[data-main-action]");
      if (mainAction) { const a = mainAction.dataset.mainAction; if (a === "new") openNewChatModal(); if (a === "markRead") markChatRead(state.selectedId); if (a === "pinChat") toggleChatPin(); if (a === "mute") toggleMute(); if (a === "archive") toggleArchive(); if (a === "block") toggleBlock(); if (a === "deleteChat") deleteCurrentChat(); if (a === "theme") { state.dark = !state.dark; applyTheme(); } hidePopovers(); return; }

      const chatAction = event.target.closest("[data-chat-action]");
      if (chatAction) { handleChatAction(chatAction.dataset.chatAction); return; }

      const removeFile = event.target.closest("[data-remove-file]");
      if (removeFile) { state.pendingFiles.splice(Number(removeFile.dataset.removeFile), 1); renderPendingFiles(); updateSendButton(); return; }

      const forwardTarget = event.target.closest("[data-forward-target]");
      if (forwardTarget) { forwardToChat(forwardTarget.dataset.forwardTarget); return; }

      const contactTarget = event.target.closest("[data-start-chat]");
      if (contactTarget) { createChat(contactTarget.dataset.startChat); return; }

      const material = event.target.closest("[data-material]");
      if (material) { showNotice(`${material.dataset.material}: показаны локальные материалы-заглушки`); return; }

      const setting = event.target.closest("[data-setting-action]");
      if (setting) { const a = setting.dataset.settingAction; if (a === "toggleMute") toggleMute(); if (a === "toggleArchive") toggleArchive(); if (a === "toggleChatPin") toggleChatPin(); if (a === "toggleBlock") toggleBlock(); if (a === "scrollPin") pinnedBar.click(); if (a === "materials") showNotice("Список медиа обновлен"); if (a === "links") showNotice("Ссылки: заглушка"); if (a === "deleteChat") deleteCurrentChat(); return; }

      if (!event.target.closest(".context-menu") && !event.target.closest(".main-menu-popover") && !event.target.closest(".chat-menu-popover") && !event.target.closest(".emoji-popover") && !event.target.closest("#moreBtn") && !event.target.closest("#emojiComposerBtn")) hidePopovers();
    });

    messagesBox.addEventListener("contextmenu", event => { const row = event.target.closest("[data-message-id]"); if (!row) return; event.preventDefault(); openMessageMenu(row.dataset.messageId, event.clientX, event.clientY); });
    chatList.addEventListener("contextmenu", event => { const row = event.target.closest("[data-chat-id]"); if (!row) return; event.preventDefault(); openChatMenu(row.dataset.chatId, event.clientX, event.clientY); });

    searchInput.addEventListener("input", event => { state.query = event.target.value; clearSearch.classList.toggle("show", state.query.length > 0); renderChats(); });
    clearSearch.addEventListener("click", () => { state.query = ""; searchInput.value = ""; clearSearch.classList.remove("show"); renderChats(); searchInput.focus(); });
    $("tabs").addEventListener("click", event => { const button = event.target.closest(".tab"); if (!button) return; state.filter = button.dataset.filter; document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab === button)); renderChats(); showNotice(button.textContent + ": фильтр применен"); });
    $("toggleSidebar").addEventListener("click", () => { state.sidebarOpen = !state.sidebarOpen; updateShellState(); });
    $("conversationTarget").addEventListener("click", () => { state.detailsOpen = !state.detailsOpen; updateShellState(); });
    $("closeDetails").addEventListener("click", () => { state.detailsOpen = false; updateShellState(); });
    $("menuBtn").addEventListener("click", event => { const rect = event.currentTarget.getBoundingClientRect(); openMainMenu(rect.left, rect.bottom + 8); });
    $("moreBtn").addEventListener("click", event => { const rect = event.currentTarget.getBoundingClientRect(); openMainMenu(rect.left - 190, rect.bottom + 8); });
    themeToggle.addEventListener("click", () => { state.dark = !state.dark; applyTheme(); showNotice(state.dark ? "Темная тема включена" : "Светлая тема включена"); });
    $("newChatBtn").addEventListener("click", openNewChatModal);
    $("muteBtn").addEventListener("click", toggleMute);
    $("archiveBtn").addEventListener("click", toggleArchive);
    $("archiveDetailsBtn").addEventListener("click", toggleArchive);
    $("focusSearchBtn").addEventListener("click", () => { searchInput.focus(); showNotice("Поиск активирован"); });
    $("incomingBtn").addEventListener("click", () => addIncomingMessage());
    $("docBtn").addEventListener("click", () => fileInput.click());
    $("mediaBtn").addEventListener("click", () => mediaInput.click());
    $("attachBtn").addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", event => handleFiles(event.target.files));
    mediaInput.addEventListener("change", event => handleFiles(event.target.files));
    draftInput.addEventListener("input", () => { resizeTextarea(); updateSendButton(); });
    draftInput.addEventListener("keydown", event => { if (event.key === "Enter" && !event.shiftKey) { event.preventDefault(); sendMessage(); } });
    sendBtn.addEventListener("click", sendMessage);
    $("cancelComposeState").addEventListener("click", () => { state.replyToId = null; state.editingMessageId = null; draftInput.value = ""; resizeTextarea(); renderComposeState(); updateSendButton(); });
    $("cancelSelectionBtn").addEventListener("click", () => { state.selectedMessages.clear(); state.selectMode = false; renderAll(); });
    $("copySelectedBtn").addEventListener("click", copySelected);
    $("forwardSelectedBtn").addEventListener("click", () => { if (state.selectedMessages.size) openForwardModal([...state.selectedMessages]); });
    $("deleteSelectedBtn").addEventListener("click", () => { if (state.selectedMessages.size) deleteMessages([...state.selectedMessages]); });
    $("closeForwardModal").addEventListener("click", () => forwardModal.classList.remove("show"));
    forwardModal.addEventListener("click", event => { if (event.target === forwardModal) forwardModal.classList.remove("show"); });
    $("closeNewChatModal").addEventListener("click", () => newChatModal.classList.remove("show"));
    newChatModal.addEventListener("click", event => { if (event.target === newChatModal) newChatModal.classList.remove("show"); });
    $("copyUserLinkBtn").addEventListener("click", () => copyText(userChatLink.value));
    $("undoDeleteBtn").addEventListener("click", restoreDeletedChat);
    pinnedBar.addEventListener("click", event => { if (event.target.closest("#unpinBtn")) { togglePin(getChat().pinnedMessageId); event.stopPropagation(); return; } const id = getChat().pinnedMessageId; const row = document.querySelector(`[data-message-id="${id}"]`); if (row) { row.scrollIntoView({ behavior: "smooth", block: "center" }); row.classList.add("highlight"); setTimeout(() => row.classList.remove("highlight"), 1300); } });
    $("emojiComposerBtn").addEventListener("click", event => { emojiPopover.innerHTML = `<div class="emoji-line">${["😀","😂","😍","👍","🔥","✅","❤️","👏","😮","🤔"].map(e => `<button class="emoji-btn" data-insert-emoji="${e}">${e}</button>`).join("")}</div>`; const rect = event.currentTarget.getBoundingClientRect(); placePopover(emojiPopover, rect.left, rect.top - 58); });
    emojiPopover.addEventListener("click", event => { const btn = event.target.closest("[data-insert-emoji]"); if (!btn) return; const start = draftInput.selectionStart; const end = draftInput.selectionEnd; draftInput.value = draftInput.value.slice(0, start) + btn.dataset.insertEmoji + draftInput.value.slice(end); draftInput.focus(); draftInput.selectionStart = draftInput.selectionEnd = start + btn.dataset.insertEmoji.length; resizeTextarea(); updateSendButton(); });

    window.addEventListener("resize", () => { if (window.innerWidth <= 820) state.sidebarOpen = false; updateShellState(); });
    if (window.innerWidth <= 820) state.sidebarOpen = false;
    renderAll();
  </script>
</body>
</html>
